<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observer Pattern - Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 600px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: 1rem;
  }
  .diagram {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    grid-template-rows: auto auto auto;
    gap: .5rem;
    align-items: center;
    justify-items: stretch;
    margin-bottom: .75rem;
  }
  .box {
    background: #2a2a2e;
    border: 1px solid #393639;
    border-radius: 4px;
    overflow: hidden;
    transition: border .2s, opacity .2s;
  }
  .box.amber { border: 2px solid #f0a500; }
  .box.green { border: 2px solid #28a745; }
  .box.detached { opacity: .3; border-style: dashed; }
  .box-head {
    background: #284b63;
    color: #fff;
    font-weight: 700;
    padding: .3rem .6rem;
    font-size: .8rem;
  }
  .box-head.subject { background: #4a2a1a; }
  .box-body { padding: .35rem .6rem; color: #b0b0b0; font-size: .76rem; line-height: 1.5; }
  .center-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .4rem;
  }
  .subject-box { grid-column: 2; grid-row: 2; min-width: 150px; }
  .obs-left-top    { grid-column: 1; grid-row: 1; }
  .obs-left-bottom { grid-column: 1; grid-row: 3; }
  .obs-right       { grid-column: 3; grid-row: 2; }

  .arrow-h {
    height: 2px;
    background: #393639;
    position: relative;
    transition: background .2s;
    min-width: 20px;
  }
  .arrow-h::after {
    content: '';
    position: absolute;
    right: -1px; top: -4px;
    border: 5px solid transparent;
    border-left: 7px solid #393639;
  }
  .arrow-h.amber { background: #f0a500; }
  .arrow-h.amber::after { border-left-color: #f0a500; }
  .arrow-h.green { background: #28a745; }
  .arrow-h.green::after { border-left-color: #28a745; }

  /* diagonal arrows via SVG overlay - simpler: just show text */
  .conn {
    font-size: .65rem;
    color: #555;
    text-align: center;
    padding: 0 .2rem;
  }
  .detach-btn {
    margin-top: .3rem;
    font-size: .7rem;
    padding: .2rem .5rem;
    background: #2a1a1a;
    border: 1px solid #c0392b;
    color: #e07070;
    border-radius: 3px;
    cursor: pointer;
    display: block;
    width: 100%;
  }
  .detach-btn:hover { background: #3a2020; }
  .detach-btn:disabled { opacity: .3; cursor: default; }
  .reattach-btn {
    font-size: .7rem;
    padding: .2rem .5rem;
    background: #1a2a1a;
    border: 1px solid #28a745;
    color: #70c070;
    border-radius: 3px;
    cursor: pointer;
    display: none;
    width: 100%;
    margin-top: .3rem;
  }
  .reattach-btn:hover { background: #203a20; }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Observer Pattern - Step-Through</h4>

  <div class="diagram">
    <!-- top-left: Logger -->
    <div class="box obs-left-top" id="obs-logger">
      <div class="box-head">Logger</div>
      <div class="box-body" id="logger-msg">update(event)</div>
    </div>

    <!-- connector top-left to center - just a spacer col -->
    <div class="center-col" style="grid-column:2;grid-row:1;">
      <div class="conn" id="conn-logger">&#8599; attached</div>
    </div>
    <div style="grid-column:3;grid-row:1;"></div>

    <!-- right: EmailAlert -->
    <div style="grid-column:1;grid-row:2;display:flex;align-items:center;justify-content:flex-end;">
      <div class="arrow-h" id="arr-logger" style="width:100%;"></div>
    </div>

    <!-- center: Subject -->
    <div class="box subject-box" id="subject-box">
      <div class="box-head subject">EventSource (Subject)</div>
      <div class="box-body" id="subject-body">state = "IDLE"<br>observers: [Logger, Email, Dash]</div>
    </div>

    <div style="grid-column:3;grid-row:2;display:flex;align-items:center;">
      <div class="arrow-h" id="arr-email" style="width:100%;"></div>
    </div>

    <!-- bottom-left: Dashboard -->
    <div class="box obs-left-bottom" id="obs-dash">
      <div class="box-head">Dashboard</div>
      <div class="box-body" id="dash-msg">update(event)</div>
    </div>

    <div class="center-col" style="grid-column:2;grid-row:3;">
      <div class="conn" id="conn-dash">&#8600; attached</div>
    </div>

    <!-- right: EmailAlert -->
    <div class="box" id="obs-email" style="grid-column:3;grid-row:2;">
      <div class="box-head">EmailAlert</div>
      <div class="box-body" id="email-msg">update(event)</div>
    </div>
  </div>

  <!-- Detach/reattach controls -->
  <div style="display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap;">
    <div style="flex:1;">
      <button class="detach-btn" id="btn-detach-logger">Detach Logger</button>
      <button class="reattach-btn" id="btn-reattach-logger">Re-attach Logger</button>
    </div>
    <div style="flex:1;">
      <button class="detach-btn" id="btn-detach-email">Detach EmailAlert</button>
      <button class="reattach-btn" id="btn-reattach-email">Re-attach EmailAlert</button>
    </div>
    <div style="flex:1;">
      <button class="detach-btn" id="btn-detach-dash">Detach Dashboard</button>
      <button class="reattach-btn" id="btn-reattach-dash">Re-attach Dashboard</button>
    </div>
  </div>

  <div id="stat">Press Step to begin. Three observers are attached to the Subject.</div>
  <div id="ctrl">
    <button id="btn-back" disabled>&#9664; Back</button>
    <button id="btn-step">Step &#8594;</button>
    <button id="btn-reset">&#8635; Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var steps = [
  {
    subject: '', logger: '', email: '', dash: '',
    arrLogger: '', arrEmail: '',
    subjectBody: 'state = "IDLE"\nobservers: [Logger, Email, Dash]',
    loggerMsg: 'waiting...', emailMsg: 'waiting...', dashMsg: 'waiting...',
    msg: 'Initial state. Logger, EmailAlert, and Dashboard are all attached to EventSource.'
  },
  {
    subject: 'amber', logger: '', email: '', dash: '',
    arrLogger: '', arrEmail: '',
    subjectBody: 'state = "CRITICAL"\nobservers: [Logger, Email, Dash]',
    loggerMsg: 'waiting...', emailMsg: 'waiting...', dashMsg: 'waiting...',
    msg: 'subject.set_state("CRITICAL") - Subject state changes (amber). It will now notify all observers.'
  },
  {
    subject: 'amber', logger: 'amber', email: '', dash: '',
    arrLogger: 'amber', arrEmail: '',
    subjectBody: 'state = "CRITICAL"\nnotifying observers...',
    loggerMsg: 'Logging: CRITICAL', emailMsg: 'waiting...', dashMsg: 'waiting...',
    msg: 'subject.notify() → Logger notified first. Logger.update("CRITICAL") called. Output: "Logging: CRITICAL".'
  },
  {
    subject: 'amber', logger: 'green', email: 'amber', dash: '',
    arrLogger: 'green', arrEmail: 'amber',
    subjectBody: 'state = "CRITICAL"\nnotifying observers...',
    loggerMsg: 'Logging: CRITICAL', emailMsg: 'Sending email: CRITICAL', dashMsg: 'waiting...',
    msg: 'EmailAlert notified. EmailAlert.update("CRITICAL") called. Output: "Sending email: CRITICAL".'
  },
  {
    subject: 'green', logger: 'green', email: 'green', dash: 'green',
    arrLogger: 'green', arrEmail: 'green',
    subjectBody: 'state = "CRITICAL"\nall notified.',
    loggerMsg: 'Logging: CRITICAL', emailMsg: 'Sending email: CRITICAL', dashMsg: 'Dashboard updated: CRITICAL',
    msg: 'Dashboard notified. All three observers updated automatically. Use Detach buttons below to remove observers from future notifications.'
  }
];
var idx = 0;
var detached = {logger: false, email: false, dash: false};

function draw() {
  var s = steps[idx];

  function setBox(id, cls) {
    var el = document.getElementById(id);
    var d = false;
    if (id === 'obs-logger' && detached.logger) d = true;
    if (id === 'obs-email'  && detached.email)  d = true;
    if (id === 'obs-dash'   && detached.dash)   d = true;
    el.className = 'box' + (d ? ' detached' : (cls ? ' ' + cls : ''));
  }

  setBox('subject-box', s.subject);
  setBox('obs-logger',  s.logger);
  setBox('obs-email',   s.email);
  setBox('obs-dash',    s.dash);

  function setArr(id, cls, obsKey) {
    var el = document.getElementById(id);
    el.className = 'arrow-h' + ((detached[obsKey] || !cls) ? '' : ' ' + cls);
  }
  setArr('arr-logger', s.arrLogger, 'logger');
  setArr('arr-email',  s.arrEmail,  'email');

  document.getElementById('subject-body').textContent = s.subjectBody;
  document.getElementById('logger-msg').textContent = detached.logger ? '(detached)' : s.loggerMsg;
  document.getElementById('email-msg').textContent  = detached.email  ? '(detached)' : s.emailMsg;
  document.getElementById('dash-msg').textContent   = detached.dash   ? '(detached)' : s.dashMsg;

  document.getElementById('stat').textContent = s.msg;
  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (steps.length - 1);
  document.getElementById('btn-step').disabled = idx === steps.length - 1;
  document.getElementById('btn-back').disabled = idx === 0;
}

function setupDetach(key) {
  var btn = document.getElementById('btn-detach-' + key);
  var rbtn = document.getElementById('btn-reattach-' + key);
  btn.onclick = function() {
    detached[key] = true;
    btn.style.display = 'none';
    rbtn.style.display = 'block';
    draw();
  };
  rbtn.onclick = function() {
    detached[key] = false;
    rbtn.style.display = 'none';
    btn.style.display = 'block';
    draw();
  };
}
setupDetach('logger');
setupDetach('email');
setupDetach('dash');

document.getElementById('btn-step').onclick = function() { if (idx < steps.length - 1) { idx++; draw(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; draw(); } };
document.getElementById('btn-reset').onclick = function() { idx = 0; draw(); };

draw();
</script>
</body>
</html>
