<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microservices Basics - Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 560px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .6rem;
  }

  /* Mode selector */
  .mode-bar {
    display: flex;
    gap: .4rem;
    margin-bottom: .75rem;
  }
  .mode-btn {
    flex: 1;
    padding: .3rem .5rem;
    border: 1px solid #393639;
    border-radius: 4px;
    background: #2a2a2e;
    color: #888;
    cursor: pointer;
    font-size: .78rem;
    text-align: center;
    transition: all .15s;
  }
  .mode-btn.active { background: #284b63; border-color: #284b63; color: #fff; }
  .mode-btn:hover:not(.active) { border-color: #555; color: #d4d4d4; }

  /* Diagram */
  .diagram {
    background: #1e1e20;
    border: 1px solid #393639;
    border-radius: 4px;
    padding: .7rem .65rem;
    margin-bottom: .6rem;
    min-height: 190px;
  }

  /* Monolith: big box with modules */
  .monolith-outer {
    border: 2px solid #393639;
    border-radius: 6px;
    background: #222224;
    padding: .5rem;
    margin-bottom: .5rem;
    transition: border-color .2s, background .2s;
  }
  .monolith-outer.fail { border-color: #dc3545; background: #1a0a0a; }
  .monolith-outer .mono-title {
    font-size: .62rem;
    color: #555;
    text-align: center;
    margin-bottom: .4rem;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .mono-modules {
    display: flex;
    flex-wrap: wrap;
    gap: .3rem;
    justify-content: center;
  }
  .mono-mod {
    border-radius: 3px;
    border: 1px solid #393639;
    background: #2a2a2e;
    padding: .2rem .4rem;
    font-size: .66rem;
    text-align: center;
    transition: all .2s;
  }
  .mono-mod.active { border-color: #f0a500; background: #2a2200; color: #f0a500; }
  .mono-mod.fail   { border-color: #dc3545; background: #3a1a1a; color: #dc3545; }
  .mono-mod.deploy { border-color: #007bff; background: #001a3a; color: #7ec8e3; }

  .mono-db {
    border-radius: 3px;
    border: 1px solid #555;
    background: #222224;
    padding: .18rem .5rem;
    font-size: .62rem;
    color: #888;
    text-align: center;
    margin-top: .4rem;
    transition: all .2s;
  }
  .mono-db.active { border-color: #f0a500; color: #f0a500; }
  .mono-db.fail   { border-color: #dc3545; color: #dc3545; }

  /* Microservices layout */
  .ms-row {
    display: flex;
    align-items: center;
    gap: .3rem;
    margin-bottom: .3rem;
    flex-wrap: wrap;
  }
  .ms-svc {
    border-radius: 4px;
    border: 1px solid #393639;
    background: #2a2a2e;
    padding: .25rem .35rem;
    font-size: .66rem;
    text-align: center;
    min-width: 72px;
    transition: all .2s;
  }
  .ms-svc .svc-name { font-weight: 700; }
  .ms-svc .svc-db { font-size: .56rem; color: #555; margin-top: .06rem; }
  .ms-svc .svc-label { font-size: .55rem; color: #888; margin-top: .05rem; }
  .ms-svc.active { border-color: #f0a500; background: #2a2200; }
  .ms-svc.active .svc-name { color: #f0a500; }
  .ms-svc.done { border-color: #28a745; background: #1a3a1a; }
  .ms-svc.done .svc-name { color: #28a745; }
  .ms-svc.fail { border-color: #dc3545; background: #3a1a1a; }
  .ms-svc.fail .svc-name { color: #dc3545; }
  .ms-svc.scaled { border-color: #007bff; background: #001a3a; }
  .ms-svc.scaled .svc-name { color: #7ec8e3; }
  .ms-svc.deploy-update { border-color: #f0a500; background: #2a2200; border-style: dashed; }
  .ms-svc.deploy-update .svc-name { color: #f0a500; }
  .ms-svc.idle { opacity: .45; }

  .ms-arrow {
    font-size: .7rem;
    color: #555;
    flex-shrink: 0;
  }
  .ms-arrow.green { color: #28a745; }
  .ms-arrow.blue  { color: #007bff; }
  .ms-arrow.amber { color: #f0a500; }
  .ms-arrow.red   { color: #dc3545; }
  .ms-arrow.gray  { color: #7b97aa; }

  /* Queue box */
  .msg-queue {
    border-radius: 3px;
    border: 1px dashed #393639;
    background: #222224;
    padding: .18rem .45rem;
    font-size: .6rem;
    color: #555;
    text-align: center;
    margin: .15rem 0;
    transition: all .2s;
  }
  .msg-queue.active { border-color: #f0a500; color: #f0a500; background: #1a1500; }

  /* Label badges */
  .ms-label {
    font-size: .58rem;
    padding: .1rem .28rem;
    border-radius: 3px;
    border: 1px solid #393639;
    color: #888;
    white-space: nowrap;
  }
  .ms-label.green { border-color: #28a745; color: #28a745; background: #0a1a0a; }
  .ms-label.blue  { border-color: #007bff; color: #7ec8e3; background: #00091a; }

  /* Stat */
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #284b63;
    border-radius: 0 4px 4px 0;
    font-size: .84rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }

  /* Controls */
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Microservices vs Monolith</h4>

  <div class="mode-bar">
    <div class="mode-btn active" id="mode-mono" onclick="setMode('mono')">Monolith</div>
    <div class="mode-btn" id="mode-ms" onclick="setMode('ms')">Microservices</div>
  </div>

  <div class="diagram" id="diagram"></div>

  <div id="stat">Select a mode and press Step to begin.</div>
  <div id="ctrl">
    <button id="btn-back" disabled>◀ Back</button>
    <button id="btn-step">Step →</button>
    <button id="btn-reset">↺ Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var mode = 'mono';
var idx = 0;

// ── MONOLITH STEPS ─────────────────────────────────────────────────────────────
// modules: array of {name, cls}
// outerCls: for monolith-outer
var monoSteps = [
  {
    stat: 'Monolith: all modules (UI, Auth, Orders, Payments, Inventory) live in one process, share one database.',
    outer: '',
    modules: [
      { name: 'UI', cls: '' },
      { name: 'Auth', cls: '' },
      { name: 'Orders', cls: '' },
      { name: 'Payments', cls: '' },
      { name: 'Inventory', cls: '' }
    ],
    db: '',
    request: ''
  },
  {
    stat: 'Step 1: Request comes in — enters the single monolith process.',
    outer: '',
    modules: [
      { name: 'UI', cls: 'active' },
      { name: 'Auth', cls: '' },
      { name: 'Orders', cls: '' },
      { name: 'Payments', cls: '' },
      { name: 'Inventory', cls: '' }
    ],
    db: '',
    request: '→ request'
  },
  {
    stat: 'Step 2: Request routes through the big application — passes through UI → Auth → Orders in the same process.',
    outer: '',
    modules: [
      { name: 'UI', cls: 'active' },
      { name: 'Auth', cls: 'active' },
      { name: 'Orders', cls: 'active' },
      { name: 'Payments', cls: '' },
      { name: 'Inventory', cls: '' }
    ],
    db: 'active',
    request: ''
  },
  {
    stat: 'Step 3: Payments module fails. Because everything is one process, the failure spreads — the whole app is down.',
    outer: 'fail',
    modules: [
      { name: 'UI', cls: 'fail' },
      { name: 'Auth', cls: 'fail' },
      { name: 'Orders', cls: 'fail' },
      { name: 'Payments', cls: 'fail' },
      { name: 'Inventory', cls: 'fail' }
    ],
    db: 'fail',
    request: '✕ all down'
  },
  {
    stat: 'Step 4: Deploy — even a 1-line change to Inventory requires redeploying the entire application. All modules redeploy together.',
    outer: '',
    modules: [
      { name: 'UI', cls: 'deploy' },
      { name: 'Auth', cls: 'deploy' },
      { name: 'Orders', cls: 'deploy' },
      { name: 'Payments', cls: 'deploy' },
      { name: 'Inventory', cls: 'deploy' }
    ],
    db: '',
    request: 'full redeploy'
  }
];

// ── MICROSERVICES STEPS ────────────────────────────────────────────────────────
var msSteps = [
  {
    stat: 'Microservices: each service is independent, owns its own database, and communicates over the network.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'idle', label: '' },
      { name: 'Order Svc', db: 'order-db', cls: 'idle', label: '' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'idle', label: '' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'idle', label: '' }
    ],
    queue: '',
    gateway: 'idle',
    annotations: []
  },
  {
    stat: 'Step 1: Request arrives at API Gateway — single entry point. Gateway routes to the appropriate service.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'idle', label: '' },
      { name: 'Order Svc', db: 'order-db', cls: 'idle', label: '' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'idle', label: '' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'idle', label: '' }
    ],
    queue: '',
    gateway: 'active',
    annotations: []
  },
  {
    stat: 'Step 2: Gateway routes to User Service (sync HTTP). User Service handles auth/profile lookup.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'active', label: '← sync HTTP' },
      { name: 'Order Svc', db: 'order-db', cls: 'idle', label: '' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'idle', label: '' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'idle', label: '' }
    ],
    queue: '',
    gateway: 'done',
    annotations: []
  },
  {
    stat: 'Step 3: User Service calls Order Service (sync HTTP). Each service calls its own DB — no shared tables.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'done', label: '' },
      { name: 'Order Svc', db: 'order-db', cls: 'active', label: '← sync HTTP' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'idle', label: '' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'idle', label: '' }
    ],
    queue: '',
    gateway: 'done',
    annotations: []
  },
  {
    stat: 'Step 4: Order Service publishes event to message queue (async). It does not wait for consumers.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'done', label: '' },
      { name: 'Order Svc', db: 'order-db', cls: 'done', label: '→ published event' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'idle', label: '' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'idle', label: '' }
    ],
    queue: 'active',
    gateway: 'done',
    annotations: []
  },
  {
    stat: 'Step 5: Inventory Service consumes from queue (async). Decoupled — failure here does not affect Order Service.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'done', label: '' },
      { name: 'Order Svc', db: 'order-db', cls: 'done', label: '' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'active', label: '← queue consumer' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'idle', label: '' }
    ],
    queue: 'active',
    gateway: 'done',
    annotations: []
  },
  {
    stat: 'Step 6: Payment Service fails — FAULT ISOLATION. Only Payment goes red. All other services stay green and operational.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'done', label: '' },
      { name: 'Order Svc', db: 'order-db', cls: 'done', label: '' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'done', label: '' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'fail', label: '✕ FAILURE' }
    ],
    queue: '',
    gateway: 'done',
    annotations: ['fault-isolation']
  },
  {
    stat: 'Step 7: Scale Orders Service independently — spin up 3 instances. Other services are unaffected.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'done', label: '' },
      { name: 'Order Svc ×3', db: 'order-db', cls: 'scaled', label: '3 instances' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'done', label: '' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'done', label: '' }
    ],
    queue: '',
    gateway: 'done',
    annotations: ['independent-scaling']
  },
  {
    stat: 'Step 8: Deploy — only Order Service updated. Other services keep running, zero-downtime for them.',
    showGateway: true,
    services: [
      { name: 'User Svc', db: 'user-db', cls: 'done', label: '' },
      { name: 'Order Svc', db: 'order-db', cls: 'deploy-update', label: 'deploying…' },
      { name: 'Inventory Svc', db: 'inv-db', cls: 'done', label: '' },
      { name: 'Payment Svc', db: 'pay-db', cls: 'done', label: '' }
    ],
    queue: '',
    gateway: 'done',
    annotations: ['independent-deploy']
  }
];

function getSteps() { return mode === 'mono' ? monoSteps : msSteps; }

function renderMono(step) {
  var html = '';
  // Request arrow
  if (step.request) {
    html += '<div style="text-align:center;font-size:.7rem;margin-bottom:.3rem;color:' +
      (step.request.indexOf('✕') !== -1 ? '#dc3545' : step.request.indexOf('redeploy') !== -1 ? '#007bff' : '#f0a500') + '">' + step.request + '</div>';
  }
  html += '<div class="monolith-outer ' + step.outer + '">';
  html += '<div class="mono-title">Single Process</div>';
  html += '<div class="mono-modules">';
  step.modules.forEach(function(m) {
    html += '<div class="mono-mod ' + m.cls + '">' + m.name + '</div>';
  });
  html += '</div>';
  html += '<div class="mono-db ' + step.db + '">▪ Shared DB</div>';
  html += '</div>';
  return html;
}

function renderMs(step) {
  var html = '';

  // Gateway
  var gwCls = step.gateway === 'active' ? 'ms-svc active' :
              step.gateway === 'done' ? 'ms-svc done' : 'ms-svc idle';
  html += '<div class="ms-row" style="justify-content:center;margin-bottom:.4rem">';
  html += '<div class="' + gwCls + '" style="min-width:110px"><div class="svc-name">API Gateway</div><div class="svc-db">entry point</div></div>';
  html += '</div>';

  // Queue
  if (step.queue) {
    html += '<div class="msg-queue ' + step.queue + '">Message Queue (Kafka / RabbitMQ)</div>';
  }

  // Services grid
  html += '<div class="ms-row" style="flex-wrap:wrap;justify-content:center;gap:.35rem">';
  step.services.forEach(function(s) {
    html += '<div class="ms-svc ' + s.cls + '">';
    html += '<div class="svc-name">' + s.name + '</div>';
    html += '<div class="svc-db">▪ ' + s.db + '</div>';
    if (s.label) html += '<div class="svc-label">' + s.label + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Annotation labels
  if (step.annotations && step.annotations.length > 0) {
    html += '<div style="display:flex;gap:.4rem;margin-top:.4rem;flex-wrap:wrap;justify-content:center">';
    step.annotations.forEach(function(a) {
      var lbl = a === 'fault-isolation' ? 'Fault Isolation' :
                a === 'independent-scaling' ? 'Independent Scaling' :
                a === 'independent-deploy' ? 'Independent Deploy' : a;
      var cls = a === 'fault-isolation' ? '' : 'green';
      html += '<span class="ms-label ' + cls + '">' + lbl + '</span>';
    });
    html += '</div>';
  }

  return html;
}

function draw() {
  var steps = getSteps();
  var step = steps[idx];
  document.getElementById('diagram').innerHTML = mode === 'mono' ? renderMono(step) : renderMs(step);
  document.getElementById('stat').textContent = step.stat;
  document.getElementById('counter').textContent = 'Step ' + (idx + 1) + ' / ' + steps.length;
  document.getElementById('btn-step').disabled = (idx >= steps.length - 1);
  document.getElementById('btn-step').textContent = idx >= steps.length - 1 ? 'Done ✓' : 'Step →';
  document.getElementById('btn-back').disabled = (idx === 0);
}

function setMode(m) {
  mode = m;
  idx = 0;
  document.getElementById('mode-mono').className = 'mode-btn' + (m === 'mono' ? ' active' : '');
  document.getElementById('mode-ms').className = 'mode-btn' + (m === 'ms' ? ' active' : '');
  draw();
}

document.getElementById('btn-step').onclick = function() {
  if (idx < getSteps().length - 1) { idx++; draw(); }
};
document.getElementById('btn-back').onclick = function() {
  if (idx > 0) { idx--; draw(); }
};
document.getElementById('btn-reset').onclick = function() { idx = 0; draw(); };

draw();
</script>
</body>
</html>
