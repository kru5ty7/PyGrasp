<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoization — Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 660px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  #ctrl-row {
    display: flex;
    gap: .4rem;
    margin-bottom: .75rem;
    align-items: center;
    flex-wrap: wrap;
  }
  #ctrl-row label { font-size: .78rem; color: #646464; white-space: nowrap; }
  input[type=number] {
    width: 64px;
    background: #222224;
    border: 1px solid #393639;
    border-radius: 4px;
    color: #d4d4d4;
    font-size: .85rem;
    padding: .3rem .6rem;
    outline: none;
  }
  input[type=number]:focus { border-color: #7b97aa; }
  #viz-area {
    background: #1e1e20;
    border: 1px solid #393639;
    border-radius: 6px;
    padding: .5rem;
    margin-bottom: .75rem;
    overflow: auto;
  }
  svg { display: block; }
  #panels {
    display: flex;
    gap: .75rem;
    margin-bottom: .75rem;
    flex-wrap: wrap;
  }
  #cache-panel {
    flex: 1;
    min-width: 140px;
    background: #1e1e20;
    border: 1px solid #393639;
    border-radius: 6px;
    padding: .6rem .75rem;
  }
  #cache-panel h5 { font-size: .7rem; color: #646464; text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem; }
  #cache-list { font-size: .78rem; line-height: 1.7; }
  .cache-entry { color: #007bff; }
  #stats-panel {
    flex: 1;
    min-width: 140px;
    background: #1e1e20;
    border: 1px solid #393639;
    border-radius: 6px;
    padding: .6rem .75rem;
  }
  #stats-panel h5 { font-size: .7rem; color: #646464; text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem; }
  .stat-row { font-size: .78rem; line-height: 1.7; }
  .hl-blue { color: #4da6ff; }
  .hl-green { color: #28a745; }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #buttons { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Memoization — Fibonacci Call Tree</h4>
  <div id="ctrl-row">
    <label for="n-input">n:</label>
    <input type="number" id="n-input" value="5" min="1" max="8">
    <button id="btn-apply">Apply</button>
  </div>
  <div id="viz-area">
    <svg id="tree-svg" width="620" height="300"></svg>
  </div>
  <div id="panels">
    <div id="cache-panel">
      <h5>Cache</h5>
      <div id="cache-list"><span style="color:#646464;font-size:.75rem">empty</span></div>
    </div>
    <div id="stats-panel">
      <h5>Call Stats</h5>
      <div id="stats-body" class="stat-row">—</div>
    </div>
  </div>
  <div id="stat">Press Step to begin.</div>
  <div id="buttons">
    <button id="btn-back" disabled>◀ Back</button>
    <button id="btn-step">Step →</button>
    <button id="btn-reset">↺ Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var steps = [], idx = 0, currentN = 5;

/* Pre-compute fib without memo to count naive calls */
function naiveCalls(n) {
  if (n <= 1) return 1;
  return 1 + naiveCalls(n - 1) + naiveCalls(n - 2);
}

/* Build tree nodes and steps */
function buildSteps(n) {
  var nodes = {}; // id -> {id, n, parent, children, state, value}
  var edges = []; // {from, to}
  var seq = []; // steps
  var memo = {};
  var callCount = 0;
  var cacheSnapshot = function() { return Object.assign({}, memo); };
  var nodeSnapshot = function() {
    var s = {};
    Object.keys(nodes).forEach(function(k) {
      var nd = nodes[k];
      s[k] = { id: nd.id, n: nd.n, parent: nd.parent, children: nd.children.slice(), state: nd.state, value: nd.value };
    });
    return s;
  };
  var edgeSnapshot = function() { return edges.slice(); };

  var uid = 0;
  function dfs(nval, parentId) {
    var myId = uid++;
    callCount++;
    nodes[myId] = { id: myId, n: nval, parent: parentId, children: [], state: 'pending', value: null };
    if (parentId !== null) {
      nodes[parentId].children.push(myId);
      edges.push({ from: parentId, to: myId });
    }
    seq.push({
      nodes: nodeSnapshot(), edges: edgeSnapshot(), cache: cacheSnapshot(),
      calls: callCount, highlight: myId,
      msg: 'Calling fib(' + nval + ').' + (parentId !== null ? ' Stack depth growing.' : '')
    });
    if (nval in memo) {
      nodes[myId].state = 'cached';
      nodes[myId].value = memo[nval];
      seq.push({
        nodes: nodeSnapshot(), edges: edgeSnapshot(), cache: cacheSnapshot(),
        calls: callCount, highlight: myId,
        msg: 'Cache HIT! fib(' + nval + ') = ' + memo[nval] + ' already known. No recursion needed.'
      });
      return memo[nval];
    }
    if (nval <= 1) {
      var bval = nval;
      memo[nval] = bval;
      nodes[myId].state = 'fresh';
      nodes[myId].value = bval;
      seq.push({
        nodes: nodeSnapshot(), edges: edgeSnapshot(), cache: cacheSnapshot(),
        calls: callCount, highlight: myId,
        msg: 'Base case: fib(' + nval + ') = ' + bval + '. Storing in cache.'
      });
      return bval;
    }
    var left = dfs(nval - 1, myId);
    var right = dfs(nval - 2, myId);
    var result = left + right;
    memo[nval] = result;
    nodes[myId].state = 'fresh';
    nodes[myId].value = result;
    seq.push({
      nodes: nodeSnapshot(), edges: edgeSnapshot(), cache: cacheSnapshot(),
      calls: callCount, highlight: myId,
      msg: 'fib(' + nval + ') = fib(' + (nval-1) + ') + fib(' + (nval-2) + ') = ' + left + ' + ' + right + ' = ' + result + '. Cached.'
    });
    return result;
  }
  dfs(n, null);
  return { steps: seq, naiveCalls: naiveCalls(n), finalCalls: callCount };
}

/* Layout: BFS level assignment, then x by position within level */
function computeLayout(nodesSnap) {
  var root = 0;
  var levels = {}, order = [];
  var queue = [{ id: root, level: 0 }];
  while (queue.length) {
    var cur = queue.shift();
    var nd = nodesSnap[cur.id];
    if (!nd) continue;
    levels[cur.id] = cur.level;
    order.push(cur.id);
    nd.children.forEach(function(cid) { queue.push({ id: cid, level: cur.level + 1 }); });
  }
  // Group by level
  var byLevel = {};
  order.forEach(function(id) {
    var lv = levels[id];
    if (!byLevel[lv]) byLevel[lv] = [];
    byLevel[lv].push(id);
  });
  var maxLevel = 0;
  Object.keys(byLevel).forEach(function(l) { if (+l > maxLevel) maxLevel = +l; });
  var pos = {};
  Object.keys(byLevel).forEach(function(lv) {
    var arr = byLevel[lv];
    arr.forEach(function(id, i) {
      pos[id] = { x: (i + 1) / (arr.length + 1), y: +lv };
    });
  });
  return { pos: pos, maxLevel: maxLevel };
}

var allSteps, naiveC, finalC;

function rebuild(n) {
  var res = buildSteps(n);
  allSteps = res.steps;
  naiveC = res.naiveCalls;
  finalC = res.finalCalls;
  idx = 0;
}

/* NODE COLOR */
function nodeColor(state, highlight, id) {
  if (state === 'pending') return highlight === id ? '#a06000' : '#3a3a3e';
  if (state === 'cached')  return '#007bff';
  if (state === 'fresh')   return '#28a745';
  return '#3a3a3e';
}
function nodeBorder(state, highlight, id) {
  if (highlight === id) return '#f0a500';
  if (state === 'cached') return '#4da6ff';
  if (state === 'fresh')  return '#28a745';
  return '#555';
}

function draw() {
  var s = allSteps[idx];
  var nodesSnap = s.nodes;
  var edgesSnap = s.edges;
  var layout = computeLayout(nodesSnap);
  var pos = layout.pos;
  var maxL = layout.maxLevel;
  var svgW = 620, nodeR = 20;
  var svgH = Math.max(220, (maxL + 1) * 80 + 40);
  var svg = document.getElementById('tree-svg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  var pad = 40;
  function px(id) { return pad + pos[id].x * (svgW - 2 * pad); }
  function py(id) { return 30 + pos[id].y * ((svgH - 60) / Math.max(maxL, 1)); }
  var html = '';
  // edges
  edgesSnap.forEach(function(e) {
    if (!pos[e.from] || !pos[e.to]) return;
    html += '<line x1="' + px(e.from).toFixed(1) + '" y1="' + py(e.from).toFixed(1) +
            '" x2="' + px(e.to).toFixed(1) + '" y2="' + py(e.to).toFixed(1) +
            '" stroke="#555" stroke-width="1.5"/>';
  });
  // nodes
  Object.keys(nodesSnap).forEach(function(id) {
    var nd = nodesSnap[id];
    if (!pos[id]) return;
    var cx = px(id).toFixed(1), cy = py(id).toFixed(1);
    var fill = nodeColor(nd.state, s.highlight, +id);
    var stroke = nodeBorder(nd.state, s.highlight, +id);
    html += '<circle cx="' + cx + '" cy="' + cy + '" r="' + nodeR + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2"/>';
    // label inside
    var lbl = nd.value !== null ? nd.value : ('f(' + nd.n + ')');
    html += '<text x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#fff" font-family="monospace">' + lbl + '</text>';
    // cached badge
    if (nd.state === 'cached') {
      html += '<text x="' + (parseFloat(cx) + nodeR - 2) + '" y="' + (parseFloat(cy) - nodeR + 2) + '" font-size="10" fill="#ffd700">⚡</text>';
    }
  });
  svg.innerHTML = html;

  // Cache panel
  var cache = s.cache;
  var keys = Object.keys(cache).map(Number).sort(function(a,b){return a-b;});
  var chtml = keys.length === 0 ? '<span style="color:#646464;font-size:.75rem">empty</span>' :
    keys.map(function(k) { return '<div class="cache-entry">fib(' + k + ') = ' + cache[k] + '</div>'; }).join('');
  document.getElementById('cache-list').innerHTML = chtml;

  // Stats panel
  document.getElementById('stats-body').innerHTML =
    '<div>Calls so far: <span class="hl-green">' + s.calls + '</span></div>' +
    '<div>Calls without memo: <span style="color:#c0392b">' + naiveC + '</span></div>' +
    '<div style="font-size:.72rem;color:#646464;margin-top:.2rem">Savings: ' + (naiveC - finalC) + ' redundant calls avoided</div>';

  document.getElementById('stat').textContent = s.msg;
  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (allSteps.length - 1);
  document.getElementById('btn-step').disabled = idx === allSteps.length - 1;
  document.getElementById('btn-back').disabled = idx === 0;
}

document.getElementById('btn-apply').onclick = function() {
  var v = parseInt(document.getElementById('n-input').value) || 5;
  if (v < 1) v = 1; if (v > 8) v = 8;
  currentN = v;
  rebuild(currentN); draw();
};
document.getElementById('btn-step').onclick = function() { if (idx < allSteps.length - 1) { idx++; draw(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; draw(); } };
document.getElementById('btn-reset').onclick = function() { idx = 0; draw(); };

rebuild(currentN); draw();
</script>
</body>
</html>
