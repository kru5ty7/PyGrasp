<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoization — Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 640px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  .input-row {
    display: flex; gap: .4rem; margin-bottom: .6rem; align-items: center; flex-wrap: wrap;
  }
  .input-row label { font-size: .78rem; color: #646464; white-space: nowrap; }
  input[type=number] {
    background: #222224; border: 1px solid #393639; border-radius: 4px;
    color: #d4d4d4; font-size: .85rem; padding: .3rem .6rem; outline: none; width: 64px;
  }
  input[type=number]:focus { border-color: #7b97aa; }
  #btn-apply {
    padding: .3rem .7rem; border: none; border-radius: 4px; cursor: pointer;
    font-size: .82rem; background: #2e4a30; color: #d4d4d4;
  }
  #btn-apply:hover { opacity: .8; }
  #err-msg { font-size: .75rem; color: #c0392b; margin-bottom: .5rem; min-height: 1rem; }

  #svg-area {
    background: #1e1e20;
    border: 1px solid #393639;
    border-radius: 4px;
    margin-bottom: .5rem;
    overflow: hidden;
  }
  #tree-svg { display: block; }

  .side-panels {
    display: flex; gap: .5rem; margin-bottom: .75rem; flex-wrap: wrap;
  }
  .panel {
    flex: 1; min-width: 140px;
    background: #393639; border-radius: 4px; padding: .5rem .6rem;
    font-size: .78rem;
  }
  .panel .panel-title { color: #7b97aa; font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .35rem; }
  .cache-entry { color: #28a745; }
  .cache-entry.new-entry { color: #5bc8ff; }

  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem; border: none; border-radius: 4px; cursor: pointer;
    font-size: .82rem; background: #393639; color: #d4d4d4; transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Memoization — Fibonacci Call Tree</h4>
  <div class="input-row">
    <label for="n-input">n (fib):</label>
    <input id="n-input" type="number" value="5" min="1" max="8">
    <button id="btn-apply">Apply</button>
  </div>
  <div id="err-msg"></div>
  <div id="svg-area"><svg id="tree-svg"></svg></div>
  <div class="side-panels">
    <div class="panel" id="cache-panel">
      <div class="panel-title">Cache</div>
      <div id="cache-list">—</div>
    </div>
    <div class="panel" id="calls-panel">
      <div class="panel-title">Call Counter</div>
      <div id="calls-info">—</div>
    </div>
  </div>
  <div id="stat">Press Step to begin.</div>
  <div id="ctrl">
    <button id="btn-back" disabled>◀ Back</button>
    <button id="btn-step">Step →</button>
    <button id="btn-reset">↺ Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var steps = [], idx = 0;

/* ----  Build the full call tree structure ---- */
/* Each node: { id, n, parent, children, left?, right? } */
/* We simulate top-down calls. fib(n) calls fib(n-1) then fib(n-2). */
/* Cache hits: if node's n already resolved by the time we call it → blue. */

function buildTree(N) {
  var nodes = [];   // { id, n, parentId }
  var edges = [];   // { from, to }
  var counter = [0];

  function makeNode(n, parentId) {
    var id = counter[0]++;
    nodes.push({ id: id, n: n, parentId: parentId, value: null, state: 'pending', cacheHit: false });
    if (parentId !== -1) edges.push({ from: parentId, to: id });
    return id;
  }

  /* DFS that respects memo — first encounter computes, second is cache hit */
  var memo = {};   /* n → first-computed nodeId */
  var stepsArr = [];
  var cache = {};  /* n → value, built up during sim */
  var callCount = [0];

  function dfs(n, parentId) {
    callCount[0]++;
    var id = makeNode(n, parentId);

    if (n <= 1) {
      stepsArr.push({ action: 'call', nodeId: id, callCount: callCount[0], cache: Object.assign({}, cache) });
      cache[n] = n;
      stepsArr.push({ action: 'resolve', nodeId: id, value: n, newCacheKey: n, callCount: callCount[0], cache: Object.assign({}, cache) });
      return { id: id, value: n };
    }

    if (memo.hasOwnProperty(n)) {
      /* cache hit */
      stepsArr.push({ action: 'call', nodeId: id, cacheHit: true, callCount: callCount[0], cache: Object.assign({}, cache) });
      stepsArr.push({ action: 'hit', nodeId: id, value: cache[n], callCount: callCount[0], cache: Object.assign({}, cache) });
      return { id: id, value: cache[n], cacheHit: true };
    }

    stepsArr.push({ action: 'call', nodeId: id, callCount: callCount[0], cache: Object.assign({}, cache) });
    memo[n] = id;   /* mark computing */

    var left = dfs(n - 1, id);
    var right = dfs(n - 2, id);
    var val = left.value + right.value;
    cache[n] = val;
    stepsArr.push({ action: 'resolve', nodeId: id, value: val, newCacheKey: n, callCount: callCount[0], cache: Object.assign({}, cache) });
    return { id: id, value: val };
  }

  var root = dfs(N, -1);

  /* Compute layout: BFS levels */
  /* We need parent info on nodes */
  var nodeMap = {};
  for (var i = 0; i < nodes.length; i++) nodeMap[nodes[i].id] = nodes[i];

  /* Build children lists */
  for (var i = 0; i < edges.length; i++) {
    var e = edges[i];
    var parent = nodeMap[e.from];
    if (!parent.children) parent.children = [];
    parent.children.push(e.to);
  }

  /* Compute positions — BFS, spreading by level */
  var W = 580, H_PER_LEVEL = 56, R = 18;
  var levels = [];
  var queue = [root.id];
  var visited = {};
  while (queue.length) {
    var next = [];
    var level = [];
    for (var qi = 0; qi < queue.length; qi++) {
      var nid = queue[qi];
      if (visited[nid]) continue;
      visited[nid] = true;
      level.push(nid);
      var nd = nodeMap[nid];
      if (nd.children) for (var ci = 0; ci < nd.children.length; ci++) next.push(nd.children[ci]);
    }
    if (level.length) levels.push(level);
    queue = next;
  }

  for (var li = 0; li < levels.length; li++) {
    var lvl = levels[li];
    var count = lvl.length;
    for (var ni = 0; ni < count; ni++) {
      var nd = nodeMap[lvl[ni]];
      nd.x = W / (count + 1) * (ni + 1);
      nd.y = R + li * H_PER_LEVEL + 4;
    }
  }

  var svgH = levels.length * H_PER_LEVEL + R * 2 + 8;

  /* naive without-memo call count: 2^(N+1) - 1 approx */
  function naiveCount(n) { return n <= 1 ? 1 : 1 + naiveCount(n-1) + naiveCount(n-2); }

  return { nodes: nodeMap, edges: edges, steps: stepsArr, root: root.id, svgW: W, svgH: svgH, R: R, naiveCalls: naiveCount(N), totalCalls: callCount[0] };
}

var treeData = null;

function renderSvg(nodeStates, highlightId) {
  var nd = treeData.nodes;
  var edges = treeData.edges;
  var W = treeData.svgW, H = treeData.svgH, R = treeData.R;
  var svg = document.getElementById('tree-svg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

  var html = '<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7b97aa"/></marker></defs>';

  /* edges */
  for (var ei = 0; ei < edges.length; ei++) {
    var e = edges[ei];
    var a = nd[e.from], b = nd[e.to];
    if (!a || !b) continue;
    html += '<line x1="' + a.x + '" y1="' + (a.y + R) + '" x2="' + b.x + '" y2="' + (b.y - R) + '" stroke="#393639" stroke-width="1.5" marker-end="url(#arr)"/>';
  }

  /* nodes */
  var ids = Object.keys(nd);
  for (var ii = 0; ii < ids.length; ii++) {
    var nid = parseInt(ids[ii]);
    var n = nd[nid];
    var st = nodeStates[nid] || 'hidden';
    if (st === 'hidden') continue;
    var fill = '#2a2a2e', stroke = '#393639';
    if (st === 'pending')  { fill = '#7a5000'; stroke = '#f0a500'; }
    if (st === 'resolved') { fill = '#1a5c2a'; stroke = '#28a745'; }
    if (st === 'hit')      { fill = '#0a3a6a'; stroke = '#007bff'; }
    var isHL = (nid === highlightId);
    if (isHL) stroke = '#fff';

    html += '<circle cx="' + n.x + '" cy="' + n.y + '" r="' + R + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + (isHL ? 2.5 : 1.5) + '"/>';
    var label = 'fib(' + n.n + ')';
    var valLabel = (st === 'resolved' || st === 'hit') ? String(n.resolvedValue !== undefined ? n.resolvedValue : '') : '';
    var badge = (st === 'hit') ? '✓' : '';
    html += '<text x="' + n.x + '" y="' + (n.y - 2) + '" text-anchor="middle" font-size="9" fill="#d4d4d4" font-family="monospace">' + label + '</text>';
    if (valLabel !== '') {
      html += '<text x="' + n.x + '" y="' + (n.y + 9) + '" text-anchor="middle" font-size="9" fill="' + (st==='hit'?'#5bc8ff':'#28a745') + '" font-family="monospace" font-weight="bold">=' + valLabel + (badge?' '+badge:'') + '</text>';
    }
  }
  svg.innerHTML = html;
}

function applyStep(stepIdx) {
  /* Replay all steps 0..stepIdx to compute current nodeStates */
  var nodeStates = {};  /* nodeId → state string */
  var nodeVals = {};
  var cache = {};
  var callCount = 0;

  for (var si = 0; si <= stepIdx; si++) {
    var st = treeData.steps[si];
    callCount = st.callCount;
    cache = st.cache;
    var nid = st.nodeId;
    if (st.action === 'call') {
      nodeStates[nid] = st.cacheHit ? 'hit' : 'pending';
    } else if (st.action === 'resolve') {
      nodeStates[nid] = 'resolved';
      treeData.nodes[nid].resolvedValue = st.value;
    } else if (st.action === 'hit') {
      nodeStates[nid] = 'hit';
      treeData.nodes[nid].resolvedValue = st.value;
    }
  }
  return { nodeStates: nodeStates, cache: cache, callCount: callCount };
}

function renderStep() {
  var s = treeData.steps[idx];
  var result = applyStep(idx);

  renderSvg(result.nodeStates, s.nodeId);

  /* cache panel */
  var cacheKeys = Object.keys(result.cache).sort(function(a,b){return a-b;});
  var cHtml = cacheKeys.length === 0 ? '—' : '';
  for (var i = 0; i < cacheKeys.length; i++) {
    var k = cacheKeys[i];
    var isNew = (s.action === 'resolve' || s.action === 'hit') && s.newCacheKey !== undefined && String(s.newCacheKey) === k;
    cHtml += '<div class="cache-entry' + (isNew ? ' new-entry' : '') + '">fib(' + k + ') = ' + result.cache[k] + '</div>';
  }
  document.getElementById('cache-list').innerHTML = cHtml;

  /* calls panel */
  document.getElementById('calls-info').innerHTML =
    'With memo: <b style="color:#28a745">' + result.callCount + '</b><br>' +
    'Without memo: <b style="color:#f0a500">' + treeData.naiveCalls + '</b>';

  /* status */
  var n = treeData.nodes[s.nodeId];
  var msg = '';
  if (s.action === 'call' && !s.cacheHit) msg = 'Calling fib(' + n.n + ') — node added (amber = pending).';
  else if (s.action === 'call' && s.cacheHit) msg = 'fib(' + n.n + ') already in cache — CACHE HIT! (blue, instant return).';
  else if (s.action === 'resolve') msg = 'fib(' + n.n + ') resolved = ' + s.value + '. Stored in cache (green).';
  else if (s.action === 'hit') msg = 'fib(' + n.n + ') = ' + s.value + ' returned from cache (blue ✓). No recomputation.';
  document.getElementById('stat').textContent = msg;

  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (treeData.steps.length - 1);
  document.getElementById('btn-step').disabled = (idx >= treeData.steps.length - 1);
  document.getElementById('btn-back').disabled = idx === 0;
}

function buildAndLoad() {
  var nVal = parseInt(document.getElementById('n-input').value, 10);
  var errEl = document.getElementById('err-msg');
  errEl.textContent = '';
  if (isNaN(nVal) || nVal < 1 || nVal > 8) { errEl.textContent = 'n must be 1–8.'; return; }
  treeData = buildTree(nVal);
  /* set SVG area height */
  document.getElementById('svg-area').style.height = treeData.svgH + 'px';
  idx = 0;
  /* reset node resolved values */
  var ids = Object.keys(treeData.nodes);
  for (var i = 0; i < ids.length; i++) delete treeData.nodes[ids[i]].resolvedValue;
  renderStep();
}

document.getElementById('btn-apply').onclick = buildAndLoad;
document.getElementById('n-input').onkeydown = function(e) { if (e.key === 'Enter') buildAndLoad(); };
document.getElementById('btn-step').onclick = function() { if (idx < treeData.steps.length - 1) { idx++; renderStep(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; renderStep(); } };
document.getElementById('btn-reset').onclick = function() {
  idx = 0;
  var ids = Object.keys(treeData.nodes);
  for (var i = 0; i < ids.length; i++) delete treeData.nodes[ids[i]].resolvedValue;
  renderStep();
};

buildAndLoad();
</script>
</body>
</html>
