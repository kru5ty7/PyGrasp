<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recursion - Call Stack Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 540px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  .input-row {
    display: flex; gap: .4rem; margin-bottom: .6rem; align-items: center; flex-wrap: wrap;
  }
  .input-row label { font-size: .78rem; color: #646464; white-space: nowrap; }
  select, input[type=number] {
    background: #222224; border: 1px solid #393639; border-radius: 4px;
    color: #d4d4d4; font-size: .85rem; padding: .3rem .6rem; outline: none;
  }
  input[type=number] { width: 64px; }
  #btn-apply {
    padding: .3rem .7rem; border: none; border-radius: 4px; cursor: pointer;
    font-size: .82rem; background: #2e4a30; color: #d4d4d4;
  }
  #btn-apply:hover { opacity: .8; }
  #err-msg { font-size: .75rem; color: #c0392b; margin-bottom: .5rem; min-height: 1rem; }

  /* Call stack */
  #stack-area {
    background: #1e1e20;
    border: 1px solid #393639;
    border-radius: 4px;
    padding: .5rem;
    min-height: 120px;
    margin-bottom: .5rem;
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
  }
  .stack-label {
    font-size: .62rem;
    color: #646464;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: .25rem;
  }
  .frame {
    border: 2px solid #393639;
    border-radius: 4px;
    padding: .3rem .6rem;
    background: #2a2a2e;
    font-size: .85rem;
    font-family: monospace;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background .15s, border-color .15s;
  }
  .frame .frame-call { color: #d4d4d4; }
  .frame .frame-return { color: #646464; font-size: .78rem; }
  .frame.active   { border-color: #f0a500; background: #2d2000; }
  .frame.active .frame-call { color: #f0a500; }
  .frame.resolved { border-color: #28a745; background: #0e2e17; }
  .frame.resolved .frame-call { color: #28a745; }
  .frame.resolved .frame-return { color: #9ecfad; }

  /* Return trace */
  #trace-area {
    background: #393639;
    border-radius: 4px;
    padding: .4rem .6rem;
    font-size: .78rem;
    margin-bottom: .5rem;
    min-height: 2rem;
    line-height: 1.6;
  }
  .trace-label { color: #7b97aa; font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .2rem; }
  #trace-body { font-family: monospace; color: #d4d4d4; word-break: break-all; }

  #stat {
    padding: .5rem .75rem; background: #393639;
    border-left: 3px solid #7b97aa; border-radius: 0 4px 4px 0;
    font-size: .85rem; line-height: 1.5; min-height: 2.4rem; margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem; border: none; border-radius: 4px; cursor: pointer;
    font-size: .82rem; background: #393639; color: #d4d4d4; transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Recursion - Call Stack Visualizer</h4>
  <div class="input-row">
    <label for="prob-sel">Function:</label>
    <select id="prob-sel">
      <option value="factorial">factorial(n)</option>
      <option value="fibonacci">fibonacci(n)</option>
    </select>
    <label for="n-input">n:</label>
    <input id="n-input" type="number" value="5" min="1" max="8">
    <button id="btn-apply">Apply</button>
  </div>
  <div id="err-msg"></div>
  <div class="stack-label">Call Stack (top = most recent)</div>
  <div id="stack-area"></div>
  <div id="trace-area">
    <div class="trace-label">Return Trace</div>
    <div id="trace-body">-</div>
  </div>
  <div id="stat">Press Step to begin.</div>
  <div id="ctrl">
    <button id="btn-back" disabled>◀ Back</button>
    <button id="btn-step">Step →</button>
    <button id="btn-reset">↺ Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var steps = [], idx = 0;

/* Each step: { frames: [{call, returnVal, state}], trace: string, msg: string, done? } */
/* frames[0] = bottom of stack, frames[len-1] = top */

function buildFactorialSteps(n) {
  var s = [];
  s.push({ frames: [], trace: '-', msg: 'Call stack empty. Ready to call factorial(' + n + ').', done: false });

  /* Push frames going down */
  var frames = [];
  for (var i = n; i >= 0; i--) {
    frames = frames.concat([]);  /* copy */
    /* push new frame */
    var newFrames = [];
    for (var fi = 0; fi < frames.length; fi++) newFrames.push(Object.assign({}, frames[fi]));
    newFrames.push({ call: 'factorial(' + i + ')', returnVal: null, state: 'active' });
    /* previous frame becomes waiting */
    for (var fi = 0; fi < newFrames.length - 1; fi++) {
      if (newFrames[fi].state === 'active') newFrames[fi].state = 'waiting';
    }
    frames = newFrames;
    var msg = i > 0
      ? 'Push: factorial(' + i + '). Calls factorial(' + (i-1) + ') next.'
      : 'Base case: factorial(0) = 1. Start unwinding.';
    s.push({ frames: frames.map(function(f){ return Object.assign({},f); }), trace: '-', msg: msg, done: false });
  }

  /* Unwind - compute return values */
  var returnVals = new Array(n + 1).fill(null);
  returnVals[0] = 1;
  var traceStr = '-';
  for (var i = 0; i <= n; i++) {
    if (i === 0) {
      /* resolve base case */
      var fw = frames.map(function(f){ return Object.assign({},f); });
      fw[fw.length - 1].state = 'resolved';
      fw[fw.length - 1].returnVal = 1;
      returnVals[0] = 1;
      traceStr = '0! = 1';
      s.push({ frames: fw, trace: traceStr, msg: 'factorial(0) = 1 (base case). Pop.', done: false });
      frames = fw.slice(0, fw.length - 1);
    } else {
      var val = i * returnVals[i-1];
      returnVals[i] = val;
      var fw2 = frames.map(function(f){ return Object.assign({},f); });
      /* top frame is now active again receiving return */
      if (fw2.length > 0) {
        fw2[fw2.length - 1].state = 'resolved';
        fw2[fw2.length - 1].returnVal = val;
        fw2[fw2.length - 1].call = 'factorial(' + i + ')';
      }
      /* build trace */
      var parts = [];
      for (var j = n; j >= i; j--) parts.push(j);
      var traceExpr = parts.join(' × ') + ' × 1';
      if (i < n) traceStr = i + '! = ' + traceExpr + ' = ' + val;
      else traceStr = n + '! = ' + parts.join(' × ') + ' × 1 = ' + val;
      s.push({ frames: fw2, trace: traceStr, msg: 'factorial(' + i + ') = ' + i + ' × factorial(' + (i-1) + ') = ' + i + ' × ' + returnVals[i-1] + ' = ' + val + '. Pop.', done: false });
      frames = fw2.slice(0, fw2.length - 1);
    }
  }
  s.push({ frames: [], trace: traceStr, msg: 'Stack empty. Final result: ' + n + '! = ' + returnVals[n] + '.', done: true });
  return s;
}

function buildFibonacciSteps(n) {
  var s = [];
  s.push({ frames: [], trace: '-', msg: 'Call stack empty. Ready to call fibonacci(' + n + ').', done: false });
  var events = [];
  var memo = {};

  function simulate(k, depth) {
    events.push({ type: 'push', n: k, depth: depth });
    if (k <= 1) {
      events.push({ type: 'resolve', n: k, val: k, depth: depth });
      memo[k] = k;
      return k;
    }
    var l = simulate(k-1, depth+1);
    var r = simulate(k-2, depth+1);
    var v = l + r;
    memo[k] = v;
    events.push({ type: 'resolve', n: k, val: v, depth: depth });
    return v;
  }
  simulate(n, 0);

  /* Replay events into steps - maintain an explicit stack of {call, state} */
  var stack = [];
  var resolved = {};
  var traceStr = '-';
  for (var ei = 0; ei < events.length; ei++) {
    var ev = events[ei];
    if (ev.type === 'push') {
      /* push new active frame, others become waiting */
      var newStack = stack.map(function(f) {
        return { call: f.call, returnVal: f.returnVal, state: f.state === 'active' ? 'waiting' : f.state };
      });
      newStack.push({ call: 'fibonacci(' + ev.n + ')', returnVal: null, state: 'active' });
      stack = newStack;
      var pushMsg = ev.n <= 1
        ? 'Push: fibonacci(' + ev.n + '). Base case - returns ' + ev.n + '.'
        : 'Push: fibonacci(' + ev.n + '). Will call fib(' + (ev.n-1) + ') then fib(' + (ev.n-2) + ').';
      s.push({ frames: stack.map(function(f){return Object.assign({},f);}), trace: traceStr, msg: pushMsg, done: false });
    } else {
      /* resolve top frame */
      var newStack2 = stack.map(function(f){return Object.assign({},f);});
      if (newStack2.length > 0) {
        var top = newStack2[newStack2.length - 1];
        top.state = 'resolved';
        top.returnVal = ev.val;
        top.call = 'fibonacci(' + ev.n + ')';
      }
      resolved[ev.n] = ev.val;
      if (ev.n <= 1) traceStr = 'fib(' + ev.n + ') = ' + ev.val;
      else traceStr = 'fib(' + ev.n + ') = fib(' + (ev.n-1) + ') + fib(' + (ev.n-2) + ') = ' + resolved[ev.n-1] + ' + ' + (resolved[ev.n] - resolved[ev.n-1]) + ' = ' + ev.val;
      var resolveMsg = 'fibonacci(' + ev.n + ') = ' + ev.val + '. Pop frame.';
      s.push({ frames: newStack2, trace: traceStr, msg: resolveMsg, done: false });
      /* pop */
      stack = newStack2.slice(0, newStack2.length - 1);
      /* restore waiting → active on new top */
      if (stack.length > 0) stack[stack.length-1].state = 'active';
    }
  }
  s.push({ frames: [], trace: traceStr, msg: 'Stack empty. fibonacci(' + n + ') = ' + (memo[n] !== undefined ? memo[n] : '?') + '.', done: true });
  return s;
}

function renderStep() {
  var s = steps[idx];
  var stackEl = document.getElementById('stack-area');

  if (s.frames.length === 0) {
    stackEl.innerHTML = '<div style="color:#646464;font-size:.75rem;text-align:center;padding:.5rem">Stack is empty</div>';
  } else {
    var html = '';
    /* frames[0]=bottom, frames[last]=top - we display top first (column-reverse layout) */
    for (var i = s.frames.length - 1; i >= 0; i--) {
      var f = s.frames[i];
      var cls = 'frame';
      if (f.state === 'active' || f.state === undefined) cls += ' active';
      else if (f.state === 'resolved') cls += ' resolved';
      /* waiting = neutral border */
      var retStr = f.returnVal !== null ? '→ ' + f.returnVal : '→ ?';
      html += '<div class="' + cls + '"><span class="frame-call">' + f.call + '</span><span class="frame-return">' + retStr + '</span></div>';
    }
    stackEl.innerHTML = html;
  }

  document.getElementById('trace-body').textContent = s.trace || '-';
  document.getElementById('stat').textContent = s.msg;
  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (steps.length - 1);
  document.getElementById('btn-step').disabled = !!s.done;
  document.getElementById('btn-back').disabled = idx === 0;
}

function buildAndLoad() {
  var prob = document.getElementById('prob-sel').value;
  var nVal = parseInt(document.getElementById('n-input').value, 10);
  var errEl = document.getElementById('err-msg');
  errEl.textContent = '';
  if (isNaN(nVal) || nVal < 1 || nVal > 8) { errEl.textContent = 'n must be 1–8.'; return; }
  steps = prob === 'factorial' ? buildFactorialSteps(nVal) : buildFibonacciSteps(nVal);
  idx = 0;
  renderStep();
}

document.getElementById('btn-apply').onclick = buildAndLoad;
document.getElementById('n-input').onkeydown = function(e) { if (e.key === 'Enter') buildAndLoad(); };
document.getElementById('btn-step').onclick = function() { if (idx < steps.length - 1) { idx++; renderStep(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; renderStep(); } };
document.getElementById('btn-reset').onclick = function() { idx = 0; renderStep(); };
document.getElementById('prob-sel').onchange = buildAndLoad;

buildAndLoad();
</script>
</body>
</html>
