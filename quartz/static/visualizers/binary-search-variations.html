<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Search Variations - Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 660px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  .input-row {
    display: flex;
    gap: .4rem;
    margin-bottom: .5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .input-row label { font-size: .78rem; color: #646464; white-space: nowrap; }
  .input-row input, .input-row select {
    background: #222224;
    border: 1px solid #393639;
    border-radius: 4px;
    color: #d4d4d4;
    font-size: .85rem;
    padding: .3rem .6rem;
    outline: none;
  }
  .input-row input:focus, .input-row select:focus { border-color: #7b97aa; }
  .input-row input.error { border-color: #c0392b; }
  #arr-input { flex: 1; min-width: 80px; }
  #target-input { width: 72px; }
  #variant-select { flex: 1; min-width: 120px; cursor: pointer; }
  #btn-apply {
    padding: .3rem .7rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #2e4a30;
    color: #d4d4d4;
    white-space: nowrap;
  }
  #btn-apply:hover { opacity: .8; }
  #err-msg { font-size: .75rem; color: #c0392b; margin-bottom: .5rem; min-height: 1rem; }
  #cells-wrap {
    overflow-x: auto;
    padding-bottom: .25rem;
    margin-bottom: .75rem;
  }
  #cells { display: flex; gap: 5px; padding-bottom: 2px; }
  .cell-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .cell-v {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #393639;
    border-radius: 4px;
    font-weight: 700;
    font-size: .9rem;
    background: #2a2a2e;
    color: #d4d4d4;
    transition: background .2s, color .2s, opacity .2s;
  }
  .cell-v.elim { opacity: 0.3; }
  .cell-v.mid { background: #f0a500; color: #000; border-color: #f0a500; }
  .cell-v.found { background: #28a745; color: #fff; border-color: #28a745; }
  .cell-v.candidate { background: #1a4a5a; color: #7b97aa; border-color: #7b97aa; }
  .cell-idx { font-size: .62rem; color: #646464; margin-top: 3px; }
  .cell-lbl {
    font-size: .65rem;
    font-weight: 700;
    color: #7b97aa;
    height: 1.1rem;
    text-align: center;
    white-space: nowrap;
    margin-top: 2px;
  }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Binary Search Variations - Step-Through</h4>
  <div class="input-row">
    <label for="variant-select">Variant:</label>
    <select id="variant-select">
      <option value="first">First Occurrence (leftmost index)</option>
      <option value="last">Last Occurrence (rightmost index)</option>
      <option value="rotated">Search in Rotated Sorted Array</option>
    </select>
  </div>
  <div class="input-row">
    <label for="arr-input">Array:</label>
    <input id="arr-input" type="text" value="1, 2, 2, 2, 3, 4, 5" placeholder="comma-separated integers" spellcheck="false">
  </div>
  <div class="input-row">
    <label for="target-input">Target:</label>
    <input id="target-input" type="number" value="2">
    <button id="btn-apply">Apply</button>
  </div>
  <div id="err-msg"></div>
  <div id="cells-wrap"><div id="cells"></div></div>
  <div id="stat">Select a variant and press Step to begin.</div>
  <div id="ctrl">
    <button id="btn-back" disabled>&#9664; Back</button>
    <button id="btn-step">Step &#8594;</button>
    <button id="btn-reset">&#8635; Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var DEFAULTS = {
  first:   { arr: [1, 2, 2, 2, 3, 4, 5], target: 2 },
  last:    { arr: [1, 2, 2, 2, 3, 4, 5], target: 2 },
  rotated: { arr: [7, 9, 1, 3, 5], target: 3 }
};

var currentArr, currentTarget, currentVariant, steps, idx;

/* -------- step builders -------- */

function buildFirst(arr, t) {
  var s = [], lo = 0, hi = arr.length - 1, result = -1;
  var varName = 'First Occurrence';
  s.push({ lo: lo, hi: hi, mid: null, result: result, done: false,
    msg: varName + ': find leftmost index of ' + t + '. Window lo=0, hi=' + (arr.length - 1) + '.' });
  while (lo <= hi) {
    var m = lo + Math.floor((hi - lo) / 2);
    if (arr[m] === t) {
      result = m;
      s.push({ lo: lo, hi: hi, mid: m, result: result, done: false,
        msg: varName + ': arr[' + m + '] = ' + arr[m] + ' equals target - record index ' + m + ', but search LEFT for earlier occurrence. hi = ' + (m - 1) + '.' });
      hi = m - 1;
    } else if (arr[m] < t) {
      s.push({ lo: lo, hi: hi, mid: m, result: result, done: false,
        msg: varName + ': arr[' + m + '] = ' + arr[m] + ' < ' + t + ' - search right. lo = ' + (m + 1) + '.' });
      lo = m + 1;
    } else {
      s.push({ lo: lo, hi: hi, mid: m, result: result, done: false,
        msg: varName + ': arr[' + m + '] = ' + arr[m] + ' > ' + t + ' - search left. hi = ' + (m - 1) + '.' });
      hi = m - 1;
    }
  }
  var finalMsg = result === -1
    ? varName + ': window empty. ' + t + ' not found in array.'
    : varName + ': done. First (leftmost) occurrence of ' + t + ' is at index ' + result + '.';
  s.push({ lo: lo, hi: hi, mid: null, result: result, done: true, msg: finalMsg });
  return s;
}

function buildLast(arr, t) {
  var s = [], lo = 0, hi = arr.length - 1, result = -1;
  var varName = 'Last Occurrence';
  s.push({ lo: lo, hi: hi, mid: null, result: result, done: false,
    msg: varName + ': find rightmost index of ' + t + '. Window lo=0, hi=' + (arr.length - 1) + '.' });
  while (lo <= hi) {
    var m = lo + Math.floor((hi - lo) / 2);
    if (arr[m] === t) {
      result = m;
      s.push({ lo: lo, hi: hi, mid: m, result: result, done: false,
        msg: varName + ': arr[' + m + '] = ' + arr[m] + ' equals target - record index ' + m + ', but search RIGHT for later occurrence. lo = ' + (m + 1) + '.' });
      lo = m + 1;
    } else if (arr[m] < t) {
      s.push({ lo: lo, hi: hi, mid: m, result: result, done: false,
        msg: varName + ': arr[' + m + '] = ' + arr[m] + ' < ' + t + ' - search right. lo = ' + (m + 1) + '.' });
      lo = m + 1;
    } else {
      s.push({ lo: lo, hi: hi, mid: m, result: result, done: false,
        msg: varName + ': arr[' + m + '] = ' + arr[m] + ' > ' + t + ' - search left. hi = ' + (m - 1) + '.' });
      hi = m - 1;
    }
  }
  var finalMsg = result === -1
    ? varName + ': window empty. ' + t + ' not found in array.'
    : varName + ': done. Last (rightmost) occurrence of ' + t + ' is at index ' + result + '.';
  s.push({ lo: lo, hi: hi, mid: null, result: result, done: true, msg: finalMsg });
  return s;
}

function buildRotated(arr, t) {
  var s = [], lo = 0, hi = arr.length - 1;
  var varName = 'Rotated Array';
  s.push({ lo: lo, hi: hi, mid: null, found: false, foundIdx: -1, done: false,
    msg: varName + ': array may be rotated. Find ' + t + '. Window lo=0, hi=' + (arr.length - 1) + '.' });
  while (lo <= hi) {
    var m = lo + Math.floor((hi - lo) / 2);
    if (arr[m] === t) {
      s.push({ lo: lo, hi: hi, mid: m, found: true, foundIdx: m, done: true,
        msg: varName + ': arr[' + m + '] = ' + arr[m] + ' equals target - found at index ' + m + '!' });
      break;
    }
    // Determine which half is sorted
    var leftMsg, rightMsg;
    if (arr[lo] <= arr[m]) {
      // left half sorted
      if (arr[lo] <= t && t < arr[m]) {
        s.push({ lo: lo, hi: hi, mid: m, found: false, foundIdx: -1, done: false,
          msg: varName + ': arr[' + lo + '..' + m + '] = [' + arr[lo] + '..' + arr[m] + '] is sorted, and ' + t + ' lies in it - search left. hi = ' + (m - 1) + '.' });
        hi = m - 1;
      } else {
        s.push({ lo: lo, hi: hi, mid: m, found: false, foundIdx: -1, done: false,
          msg: varName + ': arr[' + lo + '..' + m + '] = [' + arr[lo] + '..' + arr[m] + '] is sorted, but ' + t + ' is NOT in it - search right. lo = ' + (m + 1) + '.' });
        lo = m + 1;
      }
    } else {
      // right half sorted
      if (arr[m] < t && t <= arr[hi]) {
        s.push({ lo: lo, hi: hi, mid: m, found: false, foundIdx: -1, done: false,
          msg: varName + ': arr[' + m + '..' + hi + '] = [' + arr[m] + '..' + arr[hi] + '] is sorted, and ' + t + ' lies in it - search right. lo = ' + (m + 1) + '.' });
        lo = m + 1;
      } else {
        s.push({ lo: lo, hi: hi, mid: m, found: false, foundIdx: -1, done: false,
          msg: varName + ': arr[' + m + '..' + hi + '] = [' + arr[m] + '..' + arr[hi] + '] is sorted, but ' + t + ' is NOT in it - search left. hi = ' + (m - 1) + '.' });
        hi = m - 1;
      }
    }
  }
  if (lo > hi) {
    s.push({ lo: lo, hi: hi, mid: null, found: false, foundIdx: -1, done: true,
      msg: varName + ': window empty. ' + t + ' is not in the array.' });
  }
  return s;
}

/* -------- parsing -------- */

function parseArr(raw) {
  var parts = raw.split(',').map(function(x) { return x.trim(); }).filter(function(x) { return x !== ''; });
  if (parts.length < 2 || parts.length > 24) return null;
  var nums = parts.map(Number);
  if (nums.some(isNaN)) return null;
  if (nums.some(function(n) { return Math.floor(n) !== n; })) return null;
  return nums;
}

function load(arr, target, variant) {
  currentArr = arr;
  currentTarget = target;
  currentVariant = variant;
  if (variant === 'first') steps = buildFirst(arr, target);
  else if (variant === 'last') steps = buildLast(arr, target);
  else steps = buildRotated(arr, target);
  idx = 0;
}

/* -------- drawing -------- */

function draw() {
  var s = steps[idx];
  var arr = currentArr;

  var html = arr.map(function(v, i) {
    var cls = 'cell-v';
    var lbl = [];

    if (currentVariant === 'rotated') {
      if (s.found && i === s.mid) cls += ' found';
      else if (i === s.mid) cls += ' mid';
      else if (i < s.lo || i > s.hi) cls += ' elim';
    } else {
      // first / last - highlight result candidate
      if (s.done && s.result === i) cls += ' found';
      else if (!s.done && s.result === i) cls += ' candidate';
      else if (i === s.mid && !s.done) cls += ' mid';
      else if (i < s.lo || i > s.hi) cls += ' elim';
    }

    if (i === s.lo) lbl.push('lo');
    if (s.mid !== null && i === s.mid) lbl.push('mid');
    if (i === s.hi) lbl.push('hi');
    lbl = lbl.filter(function(x, j, a) { return a.indexOf(x) === j; });

    return '<div class="cell-col"><div class="' + cls + '">' + v + '</div>'
      + '<div class="cell-idx">' + i + '</div>'
      + '<div class="cell-lbl">' + lbl.join(' ') + '</div></div>';
  }).join('');

  document.getElementById('cells').innerHTML = html;
  document.getElementById('stat').textContent = s.msg;
  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (steps.length - 1);
  document.getElementById('btn-step').disabled = s.done;
  document.getElementById('btn-back').disabled = (idx === 0);
}

function applyInput() {
  var rawArr = document.getElementById('arr-input').value;
  var rawTarget = document.getElementById('target-input').value;
  var variant = document.getElementById('variant-select').value;
  var errEl = document.getElementById('err-msg');
  var arrEl = document.getElementById('arr-input');

  var arr = parseArr(rawArr);
  if (!arr) {
    errEl.textContent = 'Enter 2–24 integers, comma-separated.';
    arrEl.classList.add('error');
    return;
  }
  var target = parseInt(rawTarget, 10);
  if (isNaN(target)) {
    errEl.textContent = 'Target must be an integer.';
    return;
  }
  // For first/last, sort the array; for rotated, keep as-is
  if (variant !== 'rotated') {
    arr.sort(function(a, b) { return a - b; });
    document.getElementById('arr-input').value = arr.join(', ');
  }
  errEl.textContent = '';
  arrEl.classList.remove('error');
  load(arr, target, variant);
  draw();
}

document.getElementById('btn-apply').onclick = applyInput;
document.getElementById('arr-input').onkeydown = function(e) { if (e.key === 'Enter') applyInput(); };
document.getElementById('target-input').onkeydown = function(e) { if (e.key === 'Enter') applyInput(); };
document.getElementById('btn-step').onclick = function() { if (idx < steps.length - 1) { idx++; draw(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; draw(); } };
document.getElementById('btn-reset').onclick = function() { load(currentArr.slice(), currentTarget, currentVariant); draw(); };

document.getElementById('variant-select').onchange = function() {
  var variant = this.value;
  var def = DEFAULTS[variant];
  document.getElementById('arr-input').value = def.arr.join(', ');
  document.getElementById('target-input').value = def.target;
  document.getElementById('err-msg').textContent = '';
  document.getElementById('arr-input').classList.remove('error');
  load(def.arr.slice(), def.target, variant);
  draw();
};

var initDef = DEFAULTS['first'];
load(initDef.arr.slice(), initDef.target, 'first');
draw();
</script>
</body>
</html>
