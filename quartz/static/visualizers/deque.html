<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deque — Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 660px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  #input-row {
    display: flex;
    gap: .4rem;
    margin-bottom: .75rem;
    align-items: center;
    flex-wrap: wrap;
  }
  #input-row label { font-size: .78rem; color: #646464; white-space: nowrap; }
  #val-input {
    width: 80px;
    background: #222224;
    border: 1px solid #393639;
    border-radius: 4px;
    color: #d4d4d4;
    font-size: .85rem;
    padding: .3rem .6rem;
    outline: none;
  }
  #val-input:focus { border-color: #7b97aa; }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
    white-space: nowrap;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-push-front { background: #284b63; color: #fff; }
  #btn-push-back  { background: #2e4a30; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }

  /* Deque visualizer */
  #vis-wrapper {
    margin-bottom: .75rem;
    overflow-x: auto;
  }
  #vis-area {
    display: flex;
    align-items: center;
    gap: 0;
    min-height: 48px;
    padding: 2px 0;
    flex-wrap: nowrap;
  }
  .dq-label {
    font-size: .72rem;
    color: #7b97aa;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    padding: 0 6px;
  }
  .dq-arrow {
    color: #7b97aa;
    font-size: .9rem;
    margin: 0 2px;
    user-select: none;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .dq-node {
    min-width: 52px;
    height: 40px;
    border: 1px solid #393639;
    border-radius: 4px;
    background: #2a2a2e;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .9rem;
    color: #d4d4d4;
    padding: 0 8px;
    transition: background .3s;
    flex-shrink: 0;
  }
  .dq-node.highlight { background: #f0a500 !important; color: #161618; }
  .empty-msg {
    font-size: .82rem;
    color: #646464;
    font-style: italic;
    padding: 0 12px;
    height: 40px;
    display: flex;
    align-items: center;
    border: 1px dashed #393639;
    border-radius: 4px;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  .dir-hint {
    font-size: .7rem;
    color: #646464;
    margin-bottom: .5rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <h4>Deque (Double-Ended Queue) — Interactive</h4>
  <div class="dir-hint">← HEAD (front)&nbsp;&nbsp;&nbsp;&nbsp;TAIL (back) →</div>
  <div id="input-row">
    <label for="val-input">Value:</label>
    <input id="val-input" type="text" placeholder="e.g. 42" spellcheck="false" maxlength="6">
    <button id="btn-push-front">Push Front</button>
    <button id="btn-push-back">Push Back</button>
  </div>
  <div id="vis-wrapper">
    <div id="vis-area"></div>
  </div>
  <div id="stat">Push values onto the deque using the controls below.</div>
  <div id="ctrl">
    <button id="btn-pop-front">Pop Front</button>
    <button id="btn-pop-back">Pop Back</button>
    <button id="btn-peek-front">Peek Front</button>
    <button id="btn-peek-back">Peek Back</button>
    <button id="btn-reset">↺ Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var dq = [];
var MAX = 7;

function status(msg) {
  document.getElementById('stat').textContent = msg;
}

function render(hlIdx) {
  // hlIdx: -1 = none, 0 = front, dq.length-1 = back
  var area = document.getElementById('vis-area');
  var counter = document.getElementById('counter');
  counter.textContent = 'Size: ' + dq.length + ' / ' + MAX;

  if (dq.length === 0) {
    area.innerHTML =
      '<span class="dq-label">HEAD</span>' +
      '<span class="dq-arrow">⟵→</span>' +
      '<div class="empty-msg">Deque empty</div>' +
      '<span class="dq-arrow">⟵→</span>' +
      '<span class="dq-label">TAIL</span>';
    return;
  }

  var html = '<span class="dq-label">HEAD</span><span class="dq-arrow">→</span>';
  for (var i = 0; i < dq.length; i++) {
    var hlClass = (hlIdx === i) ? ' highlight' : '';
    html += '<div class="dq-node' + hlClass + '" id="dqnode-' + i + '">' + dq[i] + '</div>';
    if (i < dq.length - 1) {
      html += '<span class="dq-arrow">⟵→</span>';
    }
  }
  html += '<span class="dq-arrow">→</span><span class="dq-label">TAIL</span>';
  area.innerHTML = html;

  if (hlIdx >= 0) {
    var targetId = hlIdx;
    setTimeout(function() {
      var el = document.getElementById('dqnode-' + targetId);
      if (el) el.classList.remove('highlight');
    }, 1000);
  }
}

function getVal() {
  var raw = document.getElementById('val-input').value.trim();
  if (raw === '') { status('Enter a value first.'); return null; }
  return raw;
}

document.getElementById('btn-push-front').onclick = function() {
  if (dq.length >= MAX) { status('Deque full (max ' + MAX + ').'); return; }
  var v = getVal(); if (v === null) return;
  dq.unshift(v);
  render(0);
  status('Push Front: "' + v + '" added at HEAD. Deque size: ' + dq.length + '.');
};

document.getElementById('btn-push-back').onclick = function() {
  if (dq.length >= MAX) { status('Deque full (max ' + MAX + ').'); return; }
  var v = getVal(); if (v === null) return;
  dq.push(v);
  render(dq.length - 1);
  status('Push Back: "' + v + '" added at TAIL. Deque size: ' + dq.length + '.');
};

document.getElementById('btn-pop-front').onclick = function() {
  if (dq.length === 0) { status('Deque is empty — nothing to pop.'); return; }
  var v = dq.shift();
  render(-1);
  status('Pop Front: removed "' + v + '" from HEAD. New HEAD = ' + (dq.length > 0 ? '"' + dq[0] + '"' : '(deque empty)') + '.');
};

document.getElementById('btn-pop-back').onclick = function() {
  if (dq.length === 0) { status('Deque is empty — nothing to pop.'); return; }
  var v = dq.pop();
  render(-1);
  status('Pop Back: removed "' + v + '" from TAIL. New TAIL = ' + (dq.length > 0 ? '"' + dq[dq.length - 1] + '"' : '(deque empty)') + '.');
};

document.getElementById('btn-peek-front').onclick = function() {
  if (dq.length === 0) { status('Deque is empty — nothing to peek.'); return; }
  render(0);
  status('Peek Front: HEAD = "' + dq[0] + '" (not removed).');
};

document.getElementById('btn-peek-back').onclick = function() {
  if (dq.length === 0) { status('Deque is empty — nothing to peek.'); return; }
  render(dq.length - 1);
  status('Peek Back: TAIL = "' + dq[dq.length - 1] + '" (not removed).');
};

document.getElementById('btn-reset').onclick = function() {
  dq = [];
  render(-1);
  status('Deque reset.');
};

document.getElementById('val-input').onkeydown = function(e) {
  if (e.key === 'Enter') document.getElementById('btn-push-back').click();
};

render(-1);
</script>
</body>
</html>
