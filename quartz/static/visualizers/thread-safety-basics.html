<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread Safety Basics — Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 580px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #btn-mode { background: #2e4a30; color: #d4d4d4; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }

  .arena {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .5rem;
    margin-bottom: .5rem;
    min-height: 160px;
  }
  .thread-box {
    background: #2a2a2e;
    border: 1px solid #393639;
    border-radius: 4px;
    padding: .5rem .6rem;
    min-width: 120px;
    font-size: .78rem;
    transition: border-color .2s, opacity .2s, background .2s;
    flex-shrink: 0;
  }
  .thread-box .th-name { font-weight: 700; font-size: .8rem; margin-bottom: .3rem; color: #9cdcfe; }
  .thread-box .th-local { color: #646464; font-size: .7rem; }
  .thread-box .th-local span { color: #ce9178; }
  .thread-box.active { border-color: #007bff; border-width: 2px; background: #1a2340; }
  .thread-box.done { border-color: #28a745; background: #1a2e1a; }
  .thread-box.blocked { opacity: .5; border-color: #f0a500; border-width: 2px; }
  .thread-box.locked { border-color: #28a745; border-width: 2px; background: #1a2e1a; }

  .center-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .4rem;
    flex: 1;
    min-width: 0;
  }
  .counter-box {
    background: #2a2a2e;
    border: 2px solid #393639;
    border-radius: 6px;
    padding: .5rem 1rem;
    text-align: center;
    min-width: 90px;
    transition: border-color .2s, background .2s;
  }
  .counter-box .ctr-label { font-size: .67rem; color: #646464; text-transform: uppercase; letter-spacing: .06em; }
  .counter-box .ctr-val { font-size: 1.8rem; font-weight: 700; color: #d4d4d4; line-height: 1.2; }
  .counter-box.error { border-color: #c0392b; background: #2a1a1a; }
  .counter-box.success { border-color: #28a745; background: #1a2e1a; }

  .arrow {
    font-size: .75rem;
    color: #646464;
    text-align: center;
    white-space: nowrap;
    padding: .1rem .3rem;
    border-radius: 3px;
    transition: color .2s, background .2s;
  }
  .arrow.amber { color: #f0c040; background: #2a2010; }
  .arrow.blue { color: #7b97aa; background: #1a2030; }

  .lock-note {
    font-size: .7rem;
    color: #646464;
    text-align: center;
    padding: .15rem .4rem;
    border-radius: 3px;
    background: #222226;
    min-height: 1.2rem;
  }
  .lock-note.active { color: #6db86d; background: #1a2e1a; }

  .mode-badge {
    display: inline-block;
    padding: .12rem .5rem;
    border-radius: 10px;
    font-size: .7rem;
    margin-bottom: .4rem;
  }
  .mode-badge.unsafe { background: #3a1a1a; color: #e07070; }
  .mode-badge.safe { background: #1a2e1a; color: #6db86d; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Thread Safety — Race Condition Step-Through</h4>
  <div id="mode-row" style="margin-bottom:.5rem"></div>
  <div id="stat">Press Step to begin.</div>
  <div id="ctrl">
    <button id="btn-back" disabled>◀ Back</button>
    <button id="btn-step">Step →</button>
    <button id="btn-reset">↺ Reset</button>
    <button id="btn-mode">With Lock 🔒</button>
    <span id="counter"></span>
  </div>
  <div class="arena">
    <div id="thread-a" class="thread-box">
      <div class="th-name">Thread A</div>
      <div class="th-local" id="ta-local">local: —</div>
    </div>
    <div class="center-col">
      <div id="arrow-a" class="arrow"></div>
      <div class="counter-box" id="counter-box">
        <div class="ctr-label">counter</div>
        <div class="ctr-val" id="ctr-val">0</div>
      </div>
      <div id="arrow-b" class="arrow"></div>
      <div class="lock-note" id="lock-note"></div>
    </div>
    <div id="thread-b" class="thread-box">
      <div class="th-name">Thread B</div>
      <div class="th-local" id="tb-local">local: —</div>
    </div>
  </div>
</div>

<script>
var UNSAFE_STEPS = [
  { msg: 'Initial state: counter = 0. Both threads ready to increment.',
    ctrVal: '0', ctrCls: '', ta: 'normal', taLocal: '—', tb: 'normal', tbLocal: '—', arrowA: '', arrowB: '', lockNote: '' },
  { msg: 'Thread A reads counter (value = 0).',
    ctrVal: '0', ctrCls: '', ta: 'active', taLocal: '0', tb: 'normal', tbLocal: '—', arrowA: '← read', arrowB: '', lockNote: '' },
  { msg: 'Thread B also reads counter (value = 0) — interleaved before A writes.',
    ctrVal: '0', ctrCls: '', ta: 'normal', taLocal: '0', tb: 'active', tbLocal: '0', arrowA: '', arrowB: 'read →', lockNote: '' },
  { msg: 'Thread A increments its local copy: 0 + 1 = 1.',
    ctrVal: '0', ctrCls: '', ta: 'active', taLocal: '1', tb: 'normal', tbLocal: '0', arrowA: '', arrowB: '', lockNote: '' },
  { msg: 'Thread B increments its local copy: 0 + 1 = 1.',
    ctrVal: '0', ctrCls: '', ta: 'normal', taLocal: '1', tb: 'active', tbLocal: '1', arrowA: '', arrowB: '', lockNote: '' },
  { msg: 'Thread A writes its local value (1) back to counter.',
    ctrVal: '1', ctrCls: '', ta: 'active', taLocal: '1', tb: 'normal', tbLocal: '1', arrowA: '1 →', arrowB: '', lockNote: '' },
  { msg: 'Thread B writes its local value (1) back to counter — overwrites A\'s result! ❌',
    ctrVal: '1', ctrCls: 'error', ta: 'normal', taLocal: '1', tb: 'active', tbLocal: '1', arrowA: '', arrowB: '← 1', lockNote: '' },
  { msg: 'Race condition: lost update. Expected counter = 2, got counter = 1. ❌',
    ctrVal: '1', ctrCls: 'error', ta: 'done', taLocal: '1', tb: 'done', tbLocal: '1', arrowA: '', arrowB: '', lockNote: '' }
];

var SAFE_STEPS = [
  { msg: 'Initial state: counter = 0. Both threads ready. Lock is free.',
    ctrVal: '0', ctrCls: '', ta: 'normal', taLocal: '—', tb: 'normal', tbLocal: '—', arrowA: '', arrowB: '', lockNote: 'Lock: free' },
  { msg: 'Thread A acquires the lock 🔒. Thread B must wait.',
    ctrVal: '0', ctrCls: '', ta: 'locked', taLocal: '—', tb: 'blocked', tbLocal: '—', arrowA: '', arrowB: '', lockNote: '🔒 Lock held by A' },
  { msg: 'Thread A reads counter (0), increments to 1, writes 1.',
    ctrVal: '1', ctrCls: '', ta: 'locked', taLocal: '1', tb: 'blocked', tbLocal: '—', arrowA: '← r/w →', arrowB: '', lockNote: '🔒 Lock held by A' },
  { msg: 'Thread A releases the lock. Thread B unblocked.',
    ctrVal: '1', ctrCls: '', ta: 'done', taLocal: '1', tb: 'normal', tbLocal: '—', arrowA: '', arrowB: '', lockNote: 'Lock: free' },
  { msg: 'Thread B acquires the lock 🔒.',
    ctrVal: '1', ctrCls: '', ta: 'done', taLocal: '1', tb: 'locked', tbLocal: '—', arrowA: '', arrowB: '', lockNote: '🔒 Lock held by B' },
  { msg: 'Thread B reads counter (1), increments to 2, writes 2.',
    ctrVal: '2', ctrCls: '', ta: 'done', taLocal: '1', tb: 'locked', tbLocal: '2', arrowA: '', arrowB: 'r/w', lockNote: '🔒 Lock held by B' },
  { msg: 'Thread B releases lock. counter = 2. ✓ Correct result!',
    ctrVal: '2', ctrCls: 'success', ta: 'done', taLocal: '1', tb: 'done', tbLocal: '2', arrowA: '', arrowB: '', lockNote: 'Lock: free' }
];

var safeMode = false;
var steps = UNSAFE_STEPS;
var idx = 0;

function draw() {
  var s = steps[idx];
  document.getElementById('stat').textContent = s.msg;
  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (steps.length - 1);
  document.getElementById('btn-step').disabled = idx >= steps.length - 1;
  document.getElementById('btn-back').disabled = idx === 0;
  document.getElementById('ctr-val').textContent = s.ctrVal;
  var cb = document.getElementById('counter-box');
  cb.className = 'counter-box' + (s.ctrCls ? ' ' + s.ctrCls : '');
  var ta = document.getElementById('thread-a');
  ta.className = 'thread-box' + (s.ta !== 'normal' ? ' ' + s.ta : '');
  document.getElementById('ta-local').innerHTML = 'local: <span>' + s.taLocal + '</span>';
  var tb = document.getElementById('thread-b');
  tb.className = 'thread-box' + (s.tb !== 'normal' ? ' ' + s.tb : '');
  document.getElementById('tb-local').innerHTML = 'local: <span>' + s.tbLocal + '</span>';
  var aa = document.getElementById('arrow-a');
  aa.textContent = s.arrowA;
  aa.className = 'arrow' + (s.arrowA ? ' amber' : '');
  var ab = document.getElementById('arrow-b');
  ab.textContent = s.arrowB;
  ab.className = 'arrow' + (s.arrowB ? ' amber' : '');
  var ln = document.getElementById('lock-note');
  ln.textContent = s.lockNote;
  ln.className = 'lock-note' + (s.lockNote && s.lockNote.indexOf('Lock: free') === -1 ? ' active' : '');
  document.getElementById('mode-row').innerHTML = '<span class="mode-badge ' + (safeMode ? 'safe' : 'unsafe') + '">' +
    (safeMode ? '🔒 With Lock — safe' : '⚠ No Lock — race condition') + '</span>';
}

document.getElementById('btn-step').onclick = function() { if (idx < steps.length - 1) { idx++; draw(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; draw(); } };
document.getElementById('btn-reset').onclick = function() { idx = 0; draw(); };
document.getElementById('btn-mode').onclick = function() {
  safeMode = !safeMode;
  steps = safeMode ? SAFE_STEPS : UNSAFE_STEPS;
  this.textContent = safeMode ? 'Without Lock ⚠' : 'With Lock 🔒';
  idx = 0;
  draw();
};

draw();
</script>
</body>
</html>
