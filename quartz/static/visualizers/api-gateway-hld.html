<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Gateway - Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 560px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  #diagram { margin-bottom: .75rem; }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
</style>
</head>
<body>
<div class="wrap">
  <h4>API Gateway - Request Routing</h4>
  <div id="diagram"></div>
  <div id="stat"></div>
  <div id="ctrl">
    <button id="btn-back" disabled>&#9664; Back</button>
    <button id="btn-step">Step &#8594;</button>
    <button id="btn-reset">&#8635; Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var C = {
  bg: '#2a2a2e', border: '#393639', header: '#284b63',
  amber: '#f0a500', green: '#28a745', red: '#dc3545',
  blue: '#007bff', text: '#d4d4d4', dim: '#333', panelBg: '#393639'
};

// Layout (SVG 520 x 300)
// Client: top center
// Gateway: middle center (tall box with 3 function labels)
// Services: bottom row: User, Order, Payment

var layout = {
  client:   { x: 200, y: 8,   w: 120, h: 30 },
  gateway:  { x: 130, y: 70,  w: 260, h: 80 },
  svcUser:  { x: 30,  y: 210, w: 110, h: 38 },
  svcOrder: { x: 205, y: 210, w: 110, h: 38 },
  svcPay:   { x: 380, y: 210, w: 110, h: 38 }
};

// steps: hi = map of node key -> 'active'|'done'|'error'|null
//        gwLabel = which function inside gateway is highlighted: 'auth'|'rate'|'route'|null
//        arrow = array of {from, to, color, label, reverse}
//        badge = optional {text, color} shown on gateway
var steps = [
  {
    msg: 'API Gateway sits between the external client and three microservices. It handles Auth, Rate Limiting, and Routing. Press Step to begin.',
    hi: {}, gwLabel: null, arrows: [], badge: null
  },
  {
    msg: 'Step 1/7: Client sends POST /api/orders/123 with Bearer token to the API Gateway.',
    hi: { client: 'active', gateway: 'active' },
    gwLabel: null,
    arrows: [{ from: 'client', to: 'gateway', color: C.amber, label: 'POST /api/orders/123' }],
    badge: null
  },
  {
    msg: 'Step 2/7: Gateway authenticates — verifies JWT signature and expiry. Token valid ✓',
    hi: { gateway: 'active' },
    gwLabel: 'auth',
    arrows: [],
    badge: { text: 'JWT valid ✓', color: C.green }
  },
  {
    msg: 'Step 3/7: Gateway checks rate limit for this user (100 req/min). Current: 42/100 — passes.',
    hi: { gateway: 'active' },
    gwLabel: 'rate',
    arrows: [],
    badge: { text: '42/100 req/min', color: C.green }
  },
  {
    msg: 'Step 4/7: Gateway inspects path /api/orders/... → routes to Order Service.',
    hi: { gateway: 'active', svcOrder: 'active' },
    gwLabel: 'route',
    arrows: [{ from: 'gateway', to: 'svcOrder', color: C.amber, label: 'Forward + X-User-ID' }],
    badge: null
  },
  {
    msg: 'Step 5/7: Order Service processes the request and responds to the Gateway.',
    hi: { svcOrder: 'done', gateway: 'done' },
    gwLabel: null,
    arrows: [{ from: 'svcOrder', to: 'gateway', color: C.green, label: '200 OK' }],
    badge: null
  },
  {
    msg: 'Step 6/7: Gateway strips internal headers (X-User-ID, X-Internal-*) and returns response to client.',
    hi: { client: 'done', gateway: 'done' },
    gwLabel: null,
    arrows: [{ from: 'gateway', to: 'client', color: C.green, label: '200 OK (clean headers)' }],
    badge: null
  },
  {
    msg: 'Step 7/7: Same user sends another request. Rate limit exceeded (101/100) → Gateway returns 429 Too Many Requests. Order Service never reached.',
    hi: { client: 'error', gateway: 'active' },
    gwLabel: 'rate',
    arrows: [
      { from: 'client', to: 'gateway', color: C.red, label: 'next request' },
      { from: 'gateway', to: 'client', color: C.red, label: '429 Too Many Requests' }
    ],
    badge: { text: '101/100 — BLOCKED', color: C.red }
  }
];

var idx = 0;

function nodeCenter(key) {
  var n = layout[key];
  return { x: n.x + n.w / 2, y: n.y + n.h / 2 };
}

function edgePoint(key, toKey) {
  var nc = nodeCenter(key);
  var tc = nodeCenter(toKey);
  var n = layout[key];
  var dx = tc.x - nc.x, dy = tc.y - nc.y;
  var absDx = Math.abs(dx), absDy = Math.abs(dy);
  var hw = n.w / 2, hh = n.h / 2;
  if (absDx === 0 && absDy === 0) return nc;
  if (absDx * hh > absDy * hw) {
    var sx = dx > 0 ? 1 : -1;
    return { x: nc.x + sx * hw, y: nc.y + dy * (hw / Math.max(absDx, 0.001)) };
  } else {
    var sy = dy > 0 ? 1 : -1;
    return { x: nc.x + dx * (hh / Math.max(absDy, 0.001)), y: nc.y + sy * hh };
  }
}

function hiBorder(key, hi) {
  var s = hi[key];
  if (s === 'active') return C.amber;
  if (s === 'done')   return C.green;
  if (s === 'error')  return C.red;
  return C.border;
}

function hiFill(key, hi) {
  var s = hi[key];
  if (s === 'active') return '#2e2810';
  if (s === 'done')   return '#0e2018';
  if (s === 'error')  return '#2e1010';
  return C.bg;
}

function renderSVG(step) {
  var hi = step.hi;
  var svgW = 520, svgH = 300;
  var out = '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" xmlns="http://www.w3.org/2000/svg">';

  // Arrow defs
  ['amber','green','red','blue'].forEach(function(name) {
    var col = C[name];
    out += '<defs><marker id="arr-' + name + '" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">'
         + '<polygon points="0 0, 8 3, 0 6" fill="' + col + '"/></marker></defs>';
  });

  function colorName(hex) {
    if (hex === C.amber) return 'amber';
    if (hex === C.green) return 'green';
    if (hex === C.red)   return 'red';
    return 'blue';
  }

  // Draw arrows
  step.arrows.forEach(function(arr) {
    var p1 = edgePoint(arr.from, arr.to);
    var p2 = edgePoint(arr.to, arr.from);
    var mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
    out += '<line x1="' + p1.x + '" y1="' + p1.y + '" x2="' + p2.x + '" y2="' + p2.y
         + '" stroke="' + arr.color + '" stroke-width="1.5" marker-end="url(#arr-' + colorName(arr.color) + ')"/>';
    if (arr.label) {
      var lw = arr.label.length * 5 + 8;
      out += '<rect x="' + (mx - lw/2) + '" y="' + (my - 8) + '" width="' + lw + '" height="13" rx="3" fill="#161618" opacity="0.9"/>';
      out += '<text x="' + mx + '" y="' + (my + 3) + '" text-anchor="middle" font-size="8.5" fill="' + arr.color + '">' + arr.label + '</text>';
    }
  });

  // Client node
  (function() {
    var n = layout.client;
    var bc = hiBorder('client', hi), bf = hiFill('client', hi);
    out += '<rect x="' + n.x + '" y="' + n.y + '" width="' + n.w + '" height="' + n.h + '" rx="4" fill="' + bf + '" stroke="' + bc + '" stroke-width="' + (hi.client ? 2 : 1) + '"/>';
    out += '<text x="' + (n.x + n.w/2) + '" y="' + (n.y + n.h/2 + 4) + '" text-anchor="middle" font-size="10" fill="' + C.text + '">External Client</text>';
  })();

  // Gateway node
  (function() {
    var n = layout.gateway;
    var bc = hiBorder('gateway', hi), bf = hiFill('gateway', hi);
    out += '<rect x="' + n.x + '" y="' + n.y + '" width="' + n.w + '" height="' + n.h + '" rx="4" fill="' + bf + '" stroke="' + bc + '" stroke-width="' + (hi.gateway ? 2 : 1) + '"/>';
    // Header strip
    out += '<rect x="' + n.x + '" y="' + n.y + '" width="' + n.w + '" height="18" rx="4" fill="' + C.header + '"/>';
    out += '<rect x="' + n.x + '" y="' + (n.y + 14) + '" width="' + n.w + '" height="4" fill="' + C.header + '"/>';
    out += '<text x="' + (n.x + n.w/2) + '" y="' + (n.y + 12) + '" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">API Gateway</text>';

    // Function labels row
    var funcs = [
      { key: 'auth',  label: 'Auth (JWT)' },
      { key: 'rate',  label: 'Rate Limit' },
      { key: 'route', label: 'Route' }
    ];
    var fw = (n.w - 20) / 3;
    var fy = n.y + 25;
    funcs.forEach(function(f, i) {
      var fx = n.x + 10 + i * (fw + 3);
      var isActive = step.gwLabel === f.key;
      var fbc = isActive ? C.amber : C.border;
      var fbg = isActive ? '#2e2810' : C.panelBg;
      out += '<rect x="' + fx + '" y="' + fy + '" width="' + fw + '" height="18" rx="3" fill="' + fbg + '" stroke="' + fbc + '" stroke-width="' + (isActive ? 1.5 : 1) + '"/>';
      out += '<text x="' + (fx + fw/2) + '" y="' + (fy + 12) + '" text-anchor="middle" font-size="8.5" fill="' + (isActive ? C.amber : '#999') + '">' + f.label + '</text>';
    });

    // Badge
    if (step.badge) {
      var bdy = fy + 24;
      out += '<rect x="' + (n.x + 10) + '" y="' + bdy + '" width="' + (n.w - 20) + '" height="14" rx="3" fill="#111" opacity="0.8"/>';
      out += '<text x="' + (n.x + n.w/2) + '" y="' + (bdy + 10) + '" text-anchor="middle" font-size="9" fill="' + step.badge.color + '">' + step.badge.text + '</text>';
    }
  })();

  // Service nodes
  var services = [
    { key: 'svcUser',  label: 'User Service' },
    { key: 'svcOrder', label: 'Order Service' },
    { key: 'svcPay',   label: 'Payment Service' }
  ];
  services.forEach(function(svc) {
    var n = layout[svc.key];
    var bc = hiBorder(svc.key, hi), bf = hiFill(svc.key, hi);
    out += '<rect x="' + n.x + '" y="' + n.y + '" width="' + n.w + '" height="' + n.h + '" rx="4" fill="' + bf + '" stroke="' + bc + '" stroke-width="' + (hi[svc.key] ? 2 : 1) + '"/>';
    out += '<rect x="' + n.x + '" y="' + n.y + '" width="' + n.w + '" height="14" rx="4" fill="' + C.panelBg + '"/>';
    out += '<rect x="' + n.x + '" y="' + (n.y + 10) + '" width="' + n.w + '" height="4" fill="' + C.panelBg + '"/>';
    out += '<text x="' + (n.x + n.w/2) + '" y="' + (n.y + 10) + '" text-anchor="middle" font-size="8" fill="#aaa">SERVICE</text>';
    out += '<text x="' + (n.x + n.w/2) + '" y="' + (n.y + 30) + '" text-anchor="middle" font-size="9" fill="' + C.text + '">' + svc.label + '</text>';
  });

  out += '</svg>';
  return out;
}

function render() {
  var step = steps[idx];
  document.getElementById('diagram').innerHTML = renderSVG(step);
  document.getElementById('stat').textContent = step.msg;
  var isLast = idx >= steps.length - 1;
  document.getElementById('btn-step').disabled = isLast;
  document.getElementById('btn-step').textContent = isLast ? 'Done ✓' : 'Step →';
  document.getElementById('btn-back').disabled = idx === 0;
  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (steps.length - 1);
}

document.getElementById('btn-step').onclick = function() { if (idx < steps.length - 1) { idx++; render(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; render(); } };
document.getElementById('btn-reset').onclick = function() { idx = 0; render(); };

render();
</script>
</body>
</html>
