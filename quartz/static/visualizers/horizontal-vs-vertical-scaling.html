<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizontal vs Vertical Scaling - Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 560px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  #toggle-row {
    display: flex;
    gap: .4rem;
    margin-bottom: 1rem;
  }
  .tog-btn {
    flex: 1;
    padding: .35rem .6rem;
    border: 1px solid #393639;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #2a2a2e;
    color: #d4d4d4;
    transition: opacity .15s;
    text-align: center;
  }
  .tog-btn.active { background: #284b63; border-color: #7b97aa; color: #fff; }
  .tog-btn:hover:not(.active) { opacity: .75; }
  #stage {
    min-height: 190px;
    margin-bottom: .75rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .5rem;
  }
  .server-box {
    background: #2a2a2e;
    border: 1px solid #393639;
    border-radius: 4px;
    padding: .4rem .7rem;
    font-size: .82rem;
    text-align: center;
    transition: all .25s;
  }
  .server-box.active-border { border: 2px solid #f0a500; }
  .server-box.success-border { border: 2px solid #28a745; }
  .server-box.error-border { border: 2px solid #dc3545; }
  .server-row { display: flex; gap: .5rem; align-items: flex-end; justify-content: center; }
  .arrow { color: #646464; font-size: .85rem; }
  .lb-box {
    background: #2a2a2e;
    border: 1px solid #7b97aa;
    border-radius: 4px;
    padding: .35rem .9rem;
    font-size: .8rem;
    text-align: center;
  }
  .req-count {
    font-size: .72rem;
    color: #7b97aa;
    margin-top: .2rem;
  }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
  .spec-row { font-size: .75rem; color: #888; margin-top: .15rem; }
  .limit-label { font-size: .72rem; color: #dc3545; margin-top: .2rem; }
  .ok-label { font-size: .72rem; color: #28a745; margin-top: .2rem; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Horizontal vs Vertical Scaling</h4>
  <div id="toggle-row">
    <div class="tog-btn active" id="btn-vert" onclick="setMode('vertical')">Vertical Scaling</div>
    <div class="tog-btn" id="btn-horiz" onclick="setMode('horizontal')">Horizontal Scaling</div>
  </div>
  <div id="stage"></div>
  <div id="stat"></div>
  <div id="ctrl">
    <button id="btn-back" disabled>◀ Back</button>
    <button id="btn-step">Step →</button>
    <button id="btn-reset">↺ Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var mode = 'vertical';
var idx = 0;

var vertSteps = [
  {
    msg: 'Start: one server handling traffic. Simple and easy to manage.',
    servers: [{ cpu: '4 CPU', ram: '8 GB RAM', label: 'Server', cls: '' }],
    note: ''
  },
  {
    msg: 'Traffic increases. Upgrade: double the CPU and RAM (vertical scale-up).',
    servers: [{ cpu: '8 CPU', ram: '16 GB RAM', label: 'Server (upgraded)', cls: 'active-border' }],
    note: ''
  },
  {
    msg: 'More traffic. Upgrade again - bigger machine, more cost.',
    servers: [{ cpu: '16 CPU', ram: '64 GB RAM', label: 'Server (upgraded)', cls: 'active-border' }],
    note: ''
  },
  {
    msg: 'Hardware ceiling reached. No larger machine exists. Single point of failure. Cannot scale further.',
    servers: [{ cpu: '64 CPU', ram: '256 GB RAM', label: 'Server - MAX', cls: 'error-border' }],
    note: 'limit',
    pros: 'Pro: simple, no code changes. Con: SPOF, hard hardware limit.'
  }
];

var horizSteps = [
  {
    msg: 'Start: 1 server, all requests go here directly.',
    count: 1, reqs: [3, 0, 0]
  },
  {
    msg: 'Traffic grows. Add Server 2 + Load Balancer. Requests split across S1 and S2.',
    count: 2, reqs: [5, 5, 0]
  },
  {
    msg: 'Add Server 3. Load distributes evenly across three servers.',
    count: 3, reqs: [4, 4, 4]
  },
  {
    msg: 'Traffic doubles. Add another server easily - no hardware ceiling!',
    count: 4, reqs: [6, 6, 6],
    ok: true
  }
];

function renderVertical() {
  var s = vertSteps[idx];
  var html = '';
  s.servers.forEach(function(sv) {
    html += '<div class="server-box ' + sv.cls + '" style="min-width:160px">';
    html += '<div>' + sv.label + '</div>';
    html += '<div class="spec-row">' + sv.cpu + ' &nbsp;|&nbsp; ' + sv.ram + '</div>';
    if (s.note === 'limit') {
      html += '<div class="limit-label">✗ Hardware limit reached</div>';
    }
    html += '</div>';
  });
  if (s.pros) {
    html += '<div style="font-size:.75rem;color:#888;text-align:center;margin-top:.3rem;">' + s.pros + '</div>';
  }
  document.getElementById('stage').innerHTML = html;
}

function renderHorizontal() {
  var s = horizSteps[idx];
  var html = '';
  if (s.count > 1) {
    html += '<div class="lb-box">Load Balancer</div>';
    html += '<div class="arrow" style="font-size:.9rem;letter-spacing:2px">';
    for (var i = 0; i < s.count; i++) html += ' ↓';
    html += '</div>';
  }
  html += '<div class="server-row">';
  var labels = ['S1', 'S2', 'S3', 'S4'];
  for (var i = 0; i < s.count; i++) {
    var cls = s.ok ? 'server-box success-border' : 'server-box';
    if (s.count > 1) cls = s.ok ? 'server-box success-border' : 'server-box active-border';
    if (i === 0 && s.count === 1) cls = 'server-box';
    html += '<div class="' + cls + '">';
    html += '<div>' + labels[i] + '</div>';
    html += '<div class="req-count">' + s.reqs[i] + ' req/s</div>';
    html += '</div>';
  }
  html += '</div>';
  if (s.ok) {
    html += '<div class="ok-label" style="font-size:.75rem;color:#28a745;text-align:center">✓ No hardware ceiling - add machines freely</div>';
  }
  document.getElementById('stage').innerHTML = html;
}

function render() {
  if (mode === 'vertical') {
    renderVertical();
    var s = vertSteps[idx];
    document.getElementById('stat').textContent = s.msg;
    document.getElementById('btn-step').disabled = idx >= vertSteps.length - 1;
    document.getElementById('counter').textContent = 'Step ' + (idx + 1) + ' / ' + vertSteps.length;
  } else {
    renderHorizontal();
    var s = horizSteps[idx];
    document.getElementById('stat').textContent = 'Horizontal: ' + s.msg;
    document.getElementById('btn-step').disabled = idx >= horizSteps.length - 1;
    document.getElementById('counter').textContent = 'Step ' + (idx + 1) + ' / ' + horizSteps.length;
  }
  document.getElementById('btn-back').disabled = idx === 0;
}

function setMode(m) {
  mode = m;
  idx = 0;
  document.getElementById('btn-vert').className = 'tog-btn' + (m === 'vertical' ? ' active' : '');
  document.getElementById('btn-horiz').className = 'tog-btn' + (m === 'horizontal' ? ' active' : '');
  render();
}

document.getElementById('btn-step').onclick = function() {
  var max = mode === 'vertical' ? vertSteps.length - 1 : horizSteps.length - 1;
  if (idx < max) { idx++; render(); }
};
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; render(); } };
document.getElementById('btn-reset').onclick = function() { idx = 0; render(); };

render();
</script>
</body>
</html>
