<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composition Over Inheritance - Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 720px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }

  .cols { display: flex; gap: 1rem; align-items: flex-start; }
  .col { flex: 1; min-width: 0; }
  .col-title {
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: .6rem;
    padding: .25rem .5rem;
    border-radius: 3px;
    text-align: center;
  }
  .col-title.bad { background: #3a1a1a; color: #e07070; }
  .col-title.good { background: #1a2e1a; color: #6db86d; }

  .class-box {
    background: #2a2a2e;
    border: 1px solid #393639;
    border-radius: 4px;
    padding: .4rem .6rem;
    font-size: .78rem;
    margin-bottom: .35rem;
    position: relative;
    transition: border-color .2s, opacity .2s;
  }
  .class-box .box-name {
    font-weight: 600;
    color: #9cdcfe;
    font-size: .8rem;
  }
  .class-box .box-sub {
    color: #646464;
    font-size: .7rem;
    margin-top: .1rem;
  }
  .class-box.active { border-color: #007bff; border-width: 2px; }
  .class-box.error { border-color: #c0392b; background: #2a1a1a; }
  .class-box.success { border-color: #28a745; background: #1a2e1a; }
  .class-box.warn { border-color: #f0a500; background: #2a2010; }
  .class-box.new-box { border-color: #c0392b; background: #2a1010; opacity: 1; }
  .class-box.faded { opacity: .35; }

  .arrow-down {
    text-align: center;
    color: #646464;
    font-size: .8rem;
    line-height: 1;
    margin-bottom: .25rem;
  }

  .slot {
    display: flex;
    align-items: center;
    gap: .4rem;
    font-size: .75rem;
    padding: .2rem .4rem;
    border-radius: 3px;
    margin-top: .25rem;
    background: #1e1e22;
    border: 1px solid #2e2e32;
    transition: border-color .2s, background .2s;
  }
  .slot .slot-label { color: #646464; font-size: .7rem; white-space: nowrap; }
  .slot .slot-val { color: #ce9178; font-size: .75rem; }
  .slot.highlight { border-color: #28a745; background: #1a2e1a; }
  .slot.highlight .slot-val { color: #6db86d; font-weight: 600; }

  .iface-group { margin-top: .5rem; }
  .iface-title { font-size: .67rem; color: #646464; margin-bottom: .25rem; text-transform: uppercase; letter-spacing: .06em; }
  .iface-impl {
    display: inline-block;
    background: #222226;
    border: 1px solid #393639;
    border-radius: 3px;
    padding: .15rem .4rem;
    font-size: .7rem;
    color: #b5cea8;
    margin: .1rem .1rem .1rem 0;
  }
  .iface-impl.active-impl { border-color: #28a745; color: #6db86d; background: #1a2e1a; }

  .badge {
    font-size: .68rem;
    padding: .08rem .35rem;
    border-radius: 10px;
    margin-left: .3rem;
  }
  .badge-red { background: #3a1a1a; color: #e07070; }
  .badge-green { background: #1a2e1a; color: #6db86d; }
  .badge-amber { background: #2a2010; color: #f0c040; }

  .q-mark { color: #f0c040; font-size: 1.1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Composition Over Inheritance - Step-Through</h4>
  <div id="stat">Press Step to begin.</div>
  <div id="ctrl">
    <button id="btn-back" disabled>◀ Back</button>
    <button id="btn-step">Step →</button>
    <button id="btn-reset">↺ Reset</button>
    <span id="counter"></span>
  </div>
  <div class="cols">
    <div class="col">
      <div class="col-title bad">Inheritance ❌ Rigid</div>
      <div id="inh-col"></div>
    </div>
    <div class="col">
      <div class="col-title good">Composition ✓ Flexible</div>
      <div id="comp-col"></div>
    </div>
  </div>
</div>
<script>
var steps = [
  {
    msg: 'Step 1 of 3 - Both approaches model a Duck. Inheritance chains classes; composition assembles behaviors.',
    inh: { chain: ['Animal', 'FlyingAnimal', 'SwimmingFlyingAnimal', 'Duck'], highlight: [], newBox: null, faded: [] },
    comp: { flySlot: 'NormalFly()', quackSlot: 'Quack()', highlightSlot: null, activeImpl: [], newBird: false }
  },
  {
    msg: 'Step 2 of 3 - Change Duck to use RocketFly. LEFT: must create a new RocketFlyingDuck subclass ✗. RIGHT: just swap duck.fly_behavior = RocketFly() ✓.',
    inh: { chain: ['Animal', 'FlyingAnimal', 'SwimmingFlyingAnimal', 'Duck', 'RocketFlyingDuck'], highlight: ['RocketFlyingDuck'], newBox: 'RocketFlyingDuck', faded: [] },
    comp: { flySlot: 'RocketFly()', quackSlot: 'Quack()', highlightSlot: 'fly', activeImpl: ['RocketFly'], newBird: false }
  },
  {
    msg: 'Step 3 of 3 - Add a new bird type. LEFT: where does Penguin fit? Must find the right spot in the hierarchy (?). RIGHT: new class, compose any behaviors instantly ✓.',
    inh: { chain: ['Animal', 'FlyingAnimal', 'SwimmingFlyingAnimal', 'Duck', 'RocketFlyingDuck'], highlight: [], newBox: null, faded: ['FlyingAnimal', 'SwimmingFlyingAnimal'], questionAt: 'Animal' },
    comp: { flySlot: 'RocketFly()', quackSlot: 'Quack()', highlightSlot: null, activeImpl: [], newBird: true }
  }
];

var idx = 0;

function renderInh(s) {
  var html = '';
  s.chain.forEach(function(name, i) {
    if (i > 0) html += '<div class="arrow-down">↓</div>';
    var cls = 'class-box';
    if (name === s.newBox) cls += ' new-box';
    else if (s.highlight.indexOf(name) !== -1) cls += ' error';
    else if (s.faded.indexOf(name) !== -1) cls += ' faded';
    var badge = '';
    if (name === s.newBox) badge = '<span class="badge badge-red">✗ new subclass</span>';
    if (s.questionAt === 'Animal' && name === 'Animal') badge = ' <span class="q-mark">?</span>';
    var sub = '';
    if (name === 'FlyingAnimal') sub = '<div class="box-sub">extends Animal</div>';
    if (name === 'SwimmingFlyingAnimal') sub = '<div class="box-sub">extends FlyingAnimal</div>';
    if (name === 'Duck') sub = '<div class="box-sub">extends SwimmingFlyingAnimal</div>';
    if (name === 'RocketFlyingDuck') sub = '<div class="box-sub">extends Duck</div>';
    html += '<div class="' + cls + '"><span class="box-name">' + name + '</span>' + badge + sub + '</div>';
  });
  document.getElementById('inh-col').innerHTML = html;
}

function renderComp(s) {
  var flyHighlight = s.highlightSlot === 'fly' ? ' highlight' : '';
  var quackHighlight = s.highlightSlot === 'quack' ? ' highlight' : '';
  var duckBadge = s.highlightSlot === 'fly' ? '<span class="badge badge-green">✓ swapped</span>' : '';
  var html = '<div class="class-box"><span class="box-name">Duck</span>' + duckBadge +
    '<div class="slot' + flyHighlight + '"><span class="slot-label">fly_behavior:</span><span class="slot-val">' + s.flySlot + '</span></div>' +
    '<div class="slot' + quackHighlight + '"><span class="slot-label">quack_behavior:</span><span class="slot-val">' + s.quackSlot + '</span></div>' +
    '</div>';

  html += '<div class="iface-group"><div class="iface-title">FlyBehavior impls</div>';
  ['NormalFly', 'RocketFly', 'NoFlight'].forEach(function(n) {
    var cls = 'iface-impl' + (s.activeImpl.indexOf(n) !== -1 ? ' active-impl' : '');
    html += '<span class="' + cls + '">' + n + '</span>';
  });
  html += '</div>';

  html += '<div class="iface-group"><div class="iface-title">QuackBehavior impls</div>';
  ['Quack', 'Squeak', 'MuteQuack'].forEach(function(n) {
    var cls = 'iface-impl' + (s.activeImpl.indexOf(n) !== -1 ? ' active-impl' : '');
    html += '<span class="' + cls + '">' + n + '</span>';
  });
  html += '</div>';

  if (s.newBird) {
    html += '<div class="class-box success" style="margin-top:.6rem"><span class="box-name">Penguin</span><span class="badge badge-green">✓ new bird</span>' +
      '<div class="slot"><span class="slot-label">fly_behavior:</span><span class="slot-val">NoFlight()</span></div>' +
      '<div class="slot"><span class="slot-label">quack_behavior:</span><span class="slot-val">MuteQuack()</span></div>' +
      '</div>';
  }

  document.getElementById('comp-col').innerHTML = html;
}

function draw() {
  var s = steps[idx];
  document.getElementById('stat').textContent = s.msg;
  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (steps.length - 1);
  document.getElementById('btn-step').disabled = idx >= steps.length - 1;
  document.getElementById('btn-back').disabled = idx === 0;
  renderInh(s.inh);
  renderComp(s.comp);
}

document.getElementById('btn-step').onclick = function() { if (idx < steps.length - 1) { idx++; draw(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; draw(); } };
document.getElementById('btn-reset').onclick = function() { idx = 0; draw(); };

draw();
</script>
</body>
</html>
