<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abstraction - Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 560px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  .class-box {
    border: 1px solid #393639;
    border-radius: 4px;
    overflow: hidden;
  }
  .cb-header {
    background: #284b63;
    color: #fff;
    font-weight: 700;
    padding: .4rem .6rem;
    font-size: .9rem;
  }
  .cb-header em { font-style: italic; font-weight: 400; color: #a0c4d8; font-size: .8rem; margin-left: .4rem; }
  .cb-methods {
    background: #2a2a2e;
    padding: .4rem .6rem;
    font-size: .85rem;
    border-top: 1px solid #393639;
  }
  .cb-methods div { line-height: 1.7; }
  .abstract-method { color: #7b97aa; font-style: italic; }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.2rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
  .diagram {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .animal-wrap { width: 220px; }
  .arrows-row {
    display: flex;
    justify-content: space-around;
    width: 100%;
    padding: 0 20px;
    margin: 0;
    opacity: 0;
    transition: opacity .3s;
  }
  .arrows-row.visible { opacity: 1; }
  .arrow-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 180px;
  }
  .arrow-line {
    width: 2px;
    height: 22px;
    background: #555;
  }
  .arrow-head {
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 9px solid #555;
  }
  .sub-row {
    display: flex;
    gap: 1rem;
    justify-content: center;
    width: 100%;
    opacity: 0;
    transition: opacity .3s;
  }
  .sub-row.visible { opacity: 1; }
  .sub-box { width: 200px; }
  .runtime-row {
    margin-top: .9rem;
    display: flex;
    align-items: center;
    gap: .6rem;
    flex-wrap: wrap;
    opacity: 0;
    transition: opacity .3s;
    width: 100%;
  }
  .runtime-row.visible { opacity: 1; }
  .var-box {
    background: #1e1e22;
    border: 1px solid #393639;
    border-radius: 4px;
    padding: .25rem .5rem;
    font-size: .82rem;
    font-family: "Cascadia Code", "Fira Code", monospace;
  }
  .var-label { color: #646464; font-size: .75rem; margin-right: .2rem; }
  .var-val { color: #f0a500; font-weight: 700; }
  .call-box {
    background: #1e1e22;
    border: 1px solid #393639;
    border-radius: 4px;
    padding: .25rem .5rem;
    font-family: "Cascadia Code", "Fira Code", monospace;
    font-size: .82rem;
    color: #d4d4d4;
  }
  .result-box {
    padding: .25rem .5rem;
    border-radius: 4px;
    font-size: .82rem;
    font-weight: 600;
    background: #1a3a1a;
    border: 1px solid #28a745;
    color: #28a745;
    font-family: "Cascadia Code", "Fira Code", monospace;
  }
  .highlight-box { border-color: #f0a500 !important; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Abstraction - Step-Through</h4>

  <div class="diagram">
    <div class="animal-wrap">
      <div class="class-box" id="animal-box">
        <div class="cb-header">Animal <em>(abstract)</em></div>
        <div class="cb-methods">
          <div class="abstract-method">+ speak(): str &nbsp;[abstract]</div>
        </div>
      </div>
    </div>

    <div class="arrows-row" id="arrows">
      <div class="arrow-col">
        <div class="arrow-head"></div>
        <div class="arrow-line"></div>
      </div>
      <div class="arrow-col">
        <div class="arrow-head"></div>
        <div class="arrow-line"></div>
      </div>
    </div>

    <div class="sub-row" id="sub-row">
      <div class="sub-box">
        <div class="class-box" id="dog-box">
          <div class="cb-header">Dog</div>
          <div class="cb-methods">
            <div id="dog-speak">+ speak(): str &rarr; 'Woof!'</div>
          </div>
        </div>
      </div>
      <div class="sub-box">
        <div class="class-box" id="cat-box">
          <div class="cb-header">Cat</div>
          <div class="cb-methods">
            <div id="cat-speak">+ speak(): str &rarr; 'Meow!'</div>
          </div>
        </div>
      </div>
    </div>

    <div class="runtime-row" id="runtime-row">
      <div class="var-box"><span class="var-label">animal:</span><span class="var-val" id="animal-val">Dog()</span></div>
      <div class="call-box">animal.speak()</div>
      <span style="color:#646464">&rarr;</span>
      <div class="result-box" id="speak-result">"Woof!"</div>
    </div>
  </div>

  <div style="margin-top:.9rem">
    <div id="stat" style="padding:.5rem .75rem;background:#393639;border-left:3px solid #7b97aa;border-radius:0 4px 4px 0;font-size:.85rem;line-height:1.5;min-height:2.2rem;margin-bottom:.75rem">Press Step to begin.</div>
    <div id="ctrl" style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap">
      <button id="btn-back" disabled>&#9664; Back</button>
      <button id="btn-step">Step &rarr;</button>
      <button id="btn-reset">&#8634; Reset</button>
      <span id="counter" style="margin-left:auto;font-size:.72rem;color:#646464">Step 0 / 4</span>
    </div>
  </div>
</div>
<script>
var step = 0;
var MSGS = [
  'Press Step to begin.',
  'Define abstract contract: speak() must be implemented by any concrete Animal subclass.',
  'Dog fulfils the contract - provides its own speak() returning "Woof!".',
  'Cat fulfils the contract differently - provides speak() returning "Meow!".',
  'Same interface, different behaviour. Swap the object and the call works identically.'
];

var animalVal = ['Dog()', 'Dog()', 'Dog()', 'Dog()', 'Cat()'];
var speakResult = ['', '"Woof!"', '"Woof!"', '"Woof!"', '"Meow!"'];

function render() {
  document.getElementById('stat').textContent = MSGS[step];
  document.getElementById('counter').textContent = 'Step ' + step + ' / 4';
  document.getElementById('btn-back').disabled = step === 0;
  document.getElementById('btn-step').disabled = step === 4;

  document.getElementById('arrows').classList.toggle('visible', step >= 2);
  document.getElementById('sub-row').classList.toggle('visible', step >= 2);
  document.getElementById('runtime-row').classList.toggle('visible', step >= 4);

  // dim/highlight subclass boxes
  document.getElementById('dog-box').style.opacity = step >= 2 ? '1' : '.3';
  document.getElementById('cat-box').style.opacity = step >= 3 ? '1' : (step === 2 ? '.35' : '.3');

  // highlight active speak() row
  document.getElementById('dog-speak').style.color = (step === 4 ? '#6c757d' : '#d4d4d4');
  document.getElementById('cat-speak').style.color = (step === 4 ? '#f0a500' : '#d4d4d4');

  document.getElementById('animal-val').textContent = animalVal[step] || 'Dog()';
  document.getElementById('speak-result').textContent = speakResult[step] || '"Woof!"';
}

document.getElementById('btn-step').onclick  = function() { if (step < 4) { step++; render(); } };
document.getElementById('btn-back').onclick  = function() { if (step > 0) { step--; render(); } };
document.getElementById('btn-reset').onclick = function() { step = 0; render(); };

render();
</script>
</body>
</html>
