<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Programming - Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #161618;
    color: #d4d4d4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 640px; }
  h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #646464;
    margin-bottom: .75rem;
  }
  .input-row {
    display: flex;
    gap: .4rem;
    margin-bottom: .6rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .input-row label { font-size: .78rem; color: #646464; white-space: nowrap; }
  select, input[type=number] {
    background: #222224;
    border: 1px solid #393639;
    border-radius: 4px;
    color: #d4d4d4;
    font-size: .85rem;
    padding: .3rem .6rem;
    outline: none;
  }
  select:focus, input[type=number]:focus { border-color: #7b97aa; }
  input[type=number] { width: 64px; }
  #btn-apply {
    padding: .3rem .7rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #2e4a30;
    color: #d4d4d4;
  }
  #btn-apply:hover { opacity: .8; }
  #err-msg { font-size: .75rem; color: #c0392b; margin-bottom: .5rem; min-height: 1rem; }
  #dp-area { margin-bottom: .75rem; overflow-x: auto; }
  .dp-table { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 0; }
  .dp-cell {
    min-width: 40px;
    height: 40px;
    border: 1px solid #393639;
    border-radius: 3px;
    background: #2a2a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: .85rem;
    font-weight: 700;
    color: #d4d4d4;
    flex-shrink: 0;
  }
  .dp-cell .cell-label { font-size: .55rem; font-weight: 400; color: #646464; margin-bottom: 1px; }
  .dp-cell.reading  { background: #b07200; border-color: #f0a500; color: #000; }
  .dp-cell.reading .cell-label { color: #332000; }
  .dp-cell.filled   { background: #1a5c2a; border-color: #28a745; color: #d4d4d4; }
  .dp-cell.filled .cell-label  { color: #9ecfad; }
  .dp-cell.current  { background: #284b63; border-color: #5b9fc0; color: #fff; }
  .dp-cell.current .cell-label { color: #9cc8e0; }
  #stat {
    padding: .5rem .75rem;
    background: #393639;
    border-left: 3px solid #7b97aa;
    border-radius: 0 4px 4px 0;
    font-size: .85rem;
    line-height: 1.5;
    min-height: 2.4rem;
    margin-bottom: .75rem;
  }
  #ctrl { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button {
    padding: .32rem .72rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: .82rem;
    background: #393639;
    color: #d4d4d4;
    transition: opacity .15s;
  }
  button:disabled { opacity: .3; cursor: default; }
  button:not(:disabled):hover { opacity: .75; }
  #btn-step { background: #284b63; color: #fff; }
  #counter { margin-left: auto; font-size: .72rem; color: #646464; }
</style>
</head>
<body>
<div class="wrap">
  <h4>Dynamic Programming - Step-Through</h4>
  <div class="input-row">
    <label for="prob-sel">Problem:</label>
    <select id="prob-sel">
      <option value="fib">Fibonacci</option>
      <option value="stairs">Climbing Stairs</option>
      <option value="coin">Coin Change</option>
    </select>
    <label for="n-input" id="n-label">n:</label>
    <input id="n-input" type="number" value="7" min="1" max="12">
    <button id="btn-apply">Apply</button>
  </div>
  <div id="err-msg"></div>
  <div id="dp-area"></div>
  <div id="stat">Press Step to begin.</div>
  <div id="ctrl">
    <button id="btn-back" disabled>◀ Back</button>
    <button id="btn-step">Step →</button>
    <button id="btn-reset">↺ Reset</button>
    <span id="counter"></span>
  </div>
</div>
<script>
var steps = [], idx = 0;
var INF = 9999;

function buildFibSteps(n) {
  var dp = new Array(n + 1).fill(null);
  var s = [];
  s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'fib', n: n,
    msg: 'Initial table - all cells empty. Base cases come next.' });
  dp[0] = 0; dp[1] = (n >= 1 ? 1 : null);
  s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'fib', n: n,
    msg: 'Base cases set: F(0) = 0' + (n >= 1 ? ', F(1) = 1.' : '.') });
  for (var i = 2; i <= n; i++) {
    var r1 = dp[i-1], r2 = dp[i-2];
    s.push({ dp: dp.slice(), reading: [i-1, i-2], current: i, problem: 'fib', n: n,
      msg: 'Computing F(' + i + ') = F(' + (i-1) + ') + F(' + (i-2) + ') = ' + r1 + ' + ' + r2 + ' ...' });
    dp[i] = r1 + r2;
    s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'fib', n: n,
      msg: 'F(' + i + ') = ' + r1 + ' + ' + r2 + ' = ' + dp[i] + '. Cell written (green).' });
  }
  s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'fib', n: n, done: true,
    msg: 'Done! F(' + n + ') = ' + dp[n] + '.' });
  return s;
}

function buildStairsSteps(n) {
  var dp = new Array(n + 1).fill(null);
  var s = [];
  s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'stairs', n: n,
    msg: 'Initial table - dp[i] = number of ways to climb i stairs.' });
  dp[0] = 1; if (n >= 1) dp[1] = 1;
  s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'stairs', n: n,
    msg: 'Base cases: dp[0] = 1 (empty path), dp[1] = 1 (one step).' });
  for (var i = 2; i <= n; i++) {
    var r1 = dp[i-1], r2 = dp[i-2];
    s.push({ dp: dp.slice(), reading: [i-1, i-2], current: i, problem: 'stairs', n: n,
      msg: 'dp[' + i + '] = dp[' + (i-1) + '] + dp[' + (i-2) + '] = ' + r1 + ' + ' + r2 + ' ...' });
    dp[i] = r1 + r2;
    s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'stairs', n: n,
      msg: 'dp[' + i + '] = ' + r1 + ' + ' + r2 + ' = ' + dp[i] + ' ways.' });
  }
  s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'stairs', n: n, done: true,
    msg: 'Done! Ways to climb ' + n + ' stairs = ' + dp[n] + '.' });
  return s;
}

function buildCoinSteps(amount) {
  var coins = [1, 2, 5];
  var dp = new Array(amount + 1).fill(INF);
  dp[0] = 0;
  var s = [];
  s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'coin', amount: amount,
    msg: 'Initial table - dp[0]=0, all others = INF. Coins: [1, 2, 5].' });
  for (var a = 1; a <= amount; a++) {
    var readSet = [];
    var parts = [];
    for (var ci = 0; ci < coins.length; ci++) {
      var c = coins[ci];
      if (c <= a && dp[a - c] < INF) {
        readSet.push(a - c);
        parts.push('dp[' + (a-c) + ']+1=' + (dp[a-c]+1) + ' (coin ' + c + ')');
      }
    }
    s.push({ dp: dp.slice(), reading: readSet, current: a, problem: 'coin', amount: amount,
      msg: 'dp[' + a + ']: checking ' + (parts.length ? parts.join(', ') : 'no valid coins') + '.' });
    var best = INF, bestCoin = -1;
    for (var ci2 = 0; ci2 < coins.length; ci2++) {
      var c2 = coins[ci2];
      if (c2 <= a && dp[a - c2] + 1 < best) { best = dp[a - c2] + 1; bestCoin = c2; }
    }
    dp[a] = best;
    var msg2 = best >= INF
      ? 'dp[' + a + '] = INF (not reachable).'
      : 'dp[' + a + '] = ' + best + ' (use coin ' + bestCoin + ' from dp[' + (a - bestCoin) + ']=' + (best-1) + ').';
    s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'coin', amount: amount, msg: msg2 });
  }
  var fin = dp[amount] >= INF
    ? 'Cannot make amount ' + amount + ' with coins [1,2,5].'
    : 'Done! Minimum coins to make ' + amount + ' = ' + dp[amount] + '.';
  s.push({ dp: dp.slice(), reading: [], current: -1, problem: 'coin', amount: amount, done: true, msg: fin });
  return s;
}

function renderStep() {
  var s = steps[idx];
  var dp = s.dp;
  var html = '<div class="dp-table">';
  for (var i = 0; i < dp.length; i++) {
    var cls = 'dp-cell';
    if (s.reading.indexOf(i) >= 0) cls += ' reading';
    else if (s.current === i) cls += ' current';
    else if (dp[i] !== null && dp[i] < INF) cls += ' filled';
    var lbl = s.problem === 'fib' ? 'F('+i+')' : 'dp['+i+']';
    var val = dp[i] === null ? '' : (dp[i] >= INF ? '∞' : String(dp[i]));
    html += '<div class="' + cls + '"><span class="cell-label">' + lbl + '</span>' + val + '</div>';
  }
  html += '</div>';
  document.getElementById('dp-area').innerHTML = html;
  document.getElementById('stat').textContent = s.msg;
  document.getElementById('counter').textContent = 'Step ' + idx + ' / ' + (steps.length - 1);
  document.getElementById('btn-step').disabled = !!s.done;
  document.getElementById('btn-back').disabled = idx === 0;
}

function buildAndLoad() {
  var prob = document.getElementById('prob-sel').value;
  var nVal = parseInt(document.getElementById('n-input').value, 10);
  var errEl = document.getElementById('err-msg');
  errEl.textContent = '';
  if (prob === 'fib' || prob === 'stairs') {
    if (isNaN(nVal) || nVal < 1 || nVal > 12) { errEl.textContent = 'n must be 1–12.'; return; }
    steps = prob === 'fib' ? buildFibSteps(nVal) : buildStairsSteps(nVal);
  } else {
    if (isNaN(nVal) || nVal < 1 || nVal > 15) { errEl.textContent = 'amount must be 1–15.'; return; }
    steps = buildCoinSteps(nVal);
  }
  idx = 0;
  renderStep();
}

document.getElementById('prob-sel').onchange = function() {
  var prob = this.value;
  var lbl = document.getElementById('n-label');
  var inp = document.getElementById('n-input');
  if (prob === 'coin') { lbl.textContent = 'amount:'; inp.max = 15; inp.value = 10; }
  else { lbl.textContent = 'n:'; inp.max = 12; inp.value = 7; }
  buildAndLoad();
};
document.getElementById('btn-apply').onclick = buildAndLoad;
document.getElementById('n-input').onkeydown = function(e) { if (e.key === 'Enter') buildAndLoad(); };
document.getElementById('btn-step').onclick = function() { if (idx < steps.length - 1) { idx++; renderStep(); } };
document.getElementById('btn-back').onclick = function() { if (idx > 0) { idx--; renderStep(); } };
document.getElementById('btn-reset').onclick = function() { idx = 0; renderStep(); };

buildAndLoad();
</script>
</body>
</html>
